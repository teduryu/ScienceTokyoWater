<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="pwaicon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007AFF">
    <title>ScienceTokyoWater</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        /* ==========================================================
           1. Variables (変数定義)
        ========================================================== */
        :root {
            /* Colors */
            --color-primary: #007AFF;
            --color-primary-hover: #005bb5;
            --color-primary-light: #E5F1FF;
            --color-bg-base: #F2F4F7;
            --color-surface: #FFFFFF;
            --color-text-main: #1C1C1E;
            --color-text-sub: #8E8E93;
            --color-danger: #FF3B30;
            --color-danger-bg: #FFEBEA;
            --color-success: #34C759;
            --color-success-bg: #EAF9EC;
            --color-border: #E5E5EA;

            /* Map Pins */
            --pin-hot: #FF3B30;
            --pin-machine: #007AFF;
            --pin-tap: #34C759;
            --pin-default: #8E8E93;

            /* Layout & Magic Numbers */
            --header-height: 60px;
            --nav-height: 70px;
            --safe-area-bottom: env(safe-area-inset-bottom);
            --z-index-map: 1;
            --z-index-view: 10;
            --z-index-floating: 1000;
            --z-index-header-nav: 2000;
            --z-index-modal: 3000;
        }

        /* ==========================================================
           2. Accessibility & Resets (アクセシビリティとリセット)
        ========================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--color-bg-base);
            color: var(--color-text-main);
            padding-top: var(--header-height);
            padding-bottom: calc(var(--nav-height) + var(--safe-area-bottom));
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 視覚的に隠すが操作は可能なクラス (チェックボックス等) */
        .visually-hidden {
            position: absolute !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;
        }

        /* buttonタグを元のdivと同様の見た目にするリセット */
        button.nav-item, button.detail-back-btn {
            appearance: none;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            font: inherit;
            color: inherit;
            cursor: pointer;
            text-align: inherit;
            outline: none;
        }

        /* ==========================================================
           3. Layout (大枠の構造)
        ========================================================== */
        .l-header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            height: var(--header-height);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-primary);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: var(--z-index-header-nav);
            box-shadow: 0 1px 0 var(--color-border);
            user-select: none;
        }
        .header-logo { width: 24px; height: 24px; margin-right: 8px; object-fit: contain; border-radius: 4px; }

        .l-container { padding: 16px; max-width: 600px; margin: 0 auto; }

        .l-bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + var(--safe-area-bottom)) 0;
            box-shadow: 0 -1px 0 var(--color-border);
            z-index: var(--z-index-header-nav);
        }

        /* ==========================================================
           4. Views & Maps (ビュー管理とマップ)
        ========================================================== */
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; height: auto; min-height: calc(100vh - 140px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .c-map-view.active {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; padding: 0; z-index: var(--z-index-view);
        }
        .c-map-element { width: 100%; height: 100%; z-index: var(--z-index-map); background-color: #e5e3df; }
        .leaflet-top { top: calc(var(--header-height) + 5px) !important; }

        /* ==========================================================
           5. Components (再利用可能なUI部品)
        ========================================================== */
        /* Typography & Dividers */
        .section-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 16px 0; color: var(--color-primary); }
        .divider { border-top: 1px solid var(--color-border); margin: 24px 0; }

        /* Buttons */
        .btn-large {
            display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
            background: var(--color-primary); color: white; border: none; padding: 16px; font-size: 1rem;
            border-radius: 12px; cursor: pointer; font-weight: 700; transition: opacity 0.2s;
        }
        .btn-large:active { opacity: 0.8; }
        .btn-large:disabled { background: var(--color-border); color: var(--color-text-sub); cursor: not-allowed; }
        .btn-secondary { background: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text-main); }
        .btn-danger-outline { border-color: var(--color-danger); color: var(--color-danger); background: var(--color-danger-bg); }

        /* Floating UIs */
        .floating-ui-top {
            position: absolute; top: calc(var(--header-height) + 16px);
            left: 50%; transform: translateX(-50%); z-index: var(--z-index-floating); pointer-events: none;
        }
        .floating-btn {
            background: var(--color-primary); color: white; padding: 10px 20px; font-size: 0.9rem;
            border-radius: 30px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); border: none;
            font-weight: 700; display: flex; align-items: center; gap: 8px;
            pointer-events: auto; cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
        }

        .floating-ui-bottom {
            position: absolute; bottom: calc(var(--nav-height) + 5px + var(--safe-area-bottom));
            left: 0; width: 100%; z-index: var(--z-index-floating); pointer-events: none;
        }
        .horizontal-scroll-list {
            pointer-events: auto; display: flex; gap: 12px; overflow-x: auto;
            padding: 10px 16px 16px 16px; scroll-snap-type: x mandatory; scrollbar-width: none; cursor: grab;
        }

        /* Cards & Lists */
        .spot-card {
            background-color: var(--color-surface); border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; border: 1px solid var(--color-border);
        }
        .spot-title { font-size: 1.1rem; font-weight: 700; margin: 4px 0 8px 0; color: var(--color-text-main); line-height: 1.4; }
        .spot-meta { font-size: 0.8rem; color: var(--color-text-sub); display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }

        /* Forms & Inputs */
        form label { display: block; margin: 20px 0 8px 0; font-size: 0.9rem; color: var(--color-text-main); font-weight: 700; }
        form input[type="text"], form input[type="file"], form textarea, select.form-select {
            width: 100%; padding: 14px; border: 1px solid var(--color-border); border-radius: 8px;
            font-size: 1rem; background: var(--color-bg-base); color: var(--color-text-main); outline: none; transition: all 0.2s;
        }
        form input:focus, form textarea:focus { border-color: var(--color-primary); background: var(--color-surface); }
        
        .selectable-label {
            display: inline-block; padding: 10px 16px; background: var(--color-surface);
            border: 1px solid var(--color-border); border-radius: 8px; font-size: 0.9rem;
            color: var(--color-text-main); cursor: pointer; font-weight: 600; text-align: center; transition: all 0.2s;
        }
        .checkbox-hidden:checked + .selectable-label {
            background: var(--color-primary); color: white; border-color: var(--color-primary);
        }
        input:focus-visible + .selectable-label {
            outline: 2px solid var(--color-primary); outline-offset: 2px;
        }

        /* Bottom Nav Items */
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem;
            color: var(--color-text-sub); width: 33.33%; cursor: pointer; transition: color 0.2s ease; font-weight: 600; padding: 4px 0;
        }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; stroke: currentColor; transition: transform 0.2s ease; }
        .nav-item.active { color: var(--color-primary); }
        .nav-item.active svg { transform: translateY(-2px); stroke-width: 2.5px; }

        /* ==========================================================
           6. Utility (ユーティリティクラス)
        ========================================================== */
        .u-flex-between { display: flex; justify-content: space-between; align-items: center; }
        .u-flex-column { display: flex; flex-direction: column; }
        .u-gap-sm { gap: 8px; }
        .u-gap-md { gap: 16px; }
        .u-mb-sm { margin-bottom: 8px; }
        .u-mb-md { margin-bottom: 16px; }
        .u-mb-lg { margin-bottom: 24px; }
        .u-mt-lg { margin-top: 24px; }
        .u-text-center { text-align: center; }
        .u-text-sub { color: var(--color-text-sub); font-size: 0.85rem; }
        .u-text-danger { color: var(--color-danger); font-weight: bold; }
        .u-flex-1 { flex: 1; }
        .u-flex-2 { flex: 2; }
        .u-resize-vertical { resize: vertical; }
        .u-min-h-80 { min-height: 80px; }
        .is-hidden { display: none !important; }

        /* その他、Leafletポップアップや特定要素の独自スタイルは維持 */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .leaflet-popup-content { margin: 14px; font-family: 'Noto Sans JP', sans-serif; width: 220px !important; }
        .add-map-container { position: relative; height: 200px; width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid var(--color-border); background-color: #e5e3df; margin-bottom: 8px; }
        .center-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: var(--z-index-floating); pointer-events: none; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.25)); transition: transform 0.1s; }
        .center-pin.moving { transform: translate(-50%, -120%); }
    </style>
</head>
<body>

<div class="app-container">
    <header id="app-header" class="l-header">
        <img src="menuicon.png" alt="Logo" class="header-logo" onerror="this.classList.add('is-hidden')">
        ScienceTokyoWater
    </header>

    <main id="main-content" style="flex:1; display:flex; flex-direction:column;">
        
        <section id="view-map" class="view-section c-map-view active">
            <div id="map" class="c-map-element"></div>
            <div class="floating-ui-top">
                <button type="button" id="gps-btn" class="floating-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                    <span id="gps-btn-text">現在地周辺を検索</span>
                </button>
            </div>
            <div class="floating-ui-bottom">
                <div id="map-visible-list" class="horizontal-scroll-list"></div>
            </div>
        </section>

        <section id="view-list" class="view-section">
            <div class="l-container">
                <h2 class="section-title">スポット一覧</h2>
                <div id="full-spot-list">
                    <p class="u-text-center u-text-sub u-mt-lg">読み込み中...</p>
                </div>
            </div>
        </section>

        <section id="view-add" class="view-section">
            <div class="l-container">
                <h2 class="section-title">新規スポットの追加</h2>
                <p class="u-text-sub u-mb-lg">見つけた給水スポットを登録して共有しましょう。<br><span class="u-text-danger">※管理者の承認後にマップに表示されます。</span></p>
                
                <article class="spot-card">
                    <form id="add-spot-form">
                        <label for="add-name">スポット名 (必須)</label>
                        <input type="text" id="add-name" required placeholder="例: 西3号館 ウォーターサーバー">
                        
                        <label>建物名・エリア と 階数 (必須)</label>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="add-placename" class="u-flex-2" required placeholder="建物名 (例: 本館)">
                            <input type="text" id="add-floor" class="u-flex-1" placeholder="階数 (例: 3階)">
                        </div>
                        
                        <label>場所の指定 (地図を動かしてピンを合わせる)</label>
                        <div class="add-map-container">
                            <div id="add-map" style="width: 100%; height: 100%; z-index: 1;"></div>
                            <div id="center-pin" class="center-pin">
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--color-danger)" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>
                            </div>
                        </div>
                        
                        <button type="button" id="btn-get-location" class="btn-large btn-secondary u-mb-md">
                            <span id="add-gps-text">現在地を取得</span>
                        </button>
                        
                        <label>設備の特徴 (複数選択可)</label>
                        <div style="display:flex; flex-wrap:wrap; gap:8px;">
                            <input type="checkbox" id="f1" name="features" value="給水機" class="visually-hidden">
                            <label for="f1" class="selectable-label">給水機</label>
                            <input type="checkbox" id="f2" name="features" value="蛇口" class="visually-hidden">
                            <label for="f2" class="selectable-label">蛇口</label>
                            <input type="checkbox" id="f3" name="features" value="お湯" class="visually-hidden">
                            <label for="f3" class="selectable-label">お湯</label>
                        </div>
                        
                        <button type="submit" id="submit-btn" class="btn-large u-mt-lg">この内容で申請する</button>
                    </form>
                </article>
            </div>
        </section>

        <section id="view-detail" class="view-section">
            <div class="l-container">
                <button type="button" class="detail-back-btn u-mb-md" onclick="goBack()" aria-label="戻る">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> 戻る
                </button>
                
                <article class="spot-card">
                    <h2 id="detail-title" class="spot-title" style="font-size: 1.5rem;"></h2>
                    <div id="detail-meta" class="spot-meta u-mb-lg"></div>
                    <button type="button" class="btn-large" onclick="flyToSpotFromDetail()">地図で場所を確認</button>
                </article>
                
                <div class="divider"></div>
                <h3 class="section-title">コメント</h3>
                <div id="detail-comments-list"></div>
                
                <form id="add-comment-form" class="u-flex-column u-gap-sm">
                    <input type="text" id="comment-name" placeholder="お名前 (省略可)">
                    <textarea id="comment-text" required placeholder="コメントを入力..." class="u-resize-vertical u-min-h-80 u-mb-sm"></textarea>
                    <button type="submit" id="submit-comment-btn" class="btn-large btn-secondary">コメントを送信</button>
                </form>
            </div>
        </section>

    </main>

    <nav class="l-bottom-nav">
        <button type="button" class="nav-item active" data-target="view-map" aria-label="マップ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
            <span>マップ</span>
        </button>
        <button type="button" class="nav-item" data-target="view-list" aria-label="リスト">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            <span>リスト</span>
        </button>
        <button type="button" class="nav-item" data-target="view-add" aria-label="追加">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span>追加</span>
        </button>
    </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
        const MAP_TILE_URL = 'https://tile.tracestrack.com/ja/{z}/{x}/{y}.png?key=27e171dc5ca2cc214ecf5ab9d0f493bd';
        const MAP_ATTRIBUTION = '&copy; OpenStreetMap contributors';
        
        const map = L.map('map', { zoomControl: false }).setView([35.6061, 139.6833], 16);
        L.tileLayer(MAP_TILE_URL, { maxZoom: 19, attribution: MAP_ATTRIBUTION }).addTo(map);

        let addMap = null;

        function initAddMap() {
            if (addMap) return;
            addMap = L.map('add-map', { zoomControl: false }).setView([35.6061, 139.6833], 16);
            L.tileLayer(MAP_TILE_URL, { maxZoom: 19 }).addTo(addMap);
            
            const pinEl = document.getElementById('center-pin');
            addMap.currentLat = 35.6061;
            addMap.currentLng = 139.6833;
            
            addMap.on('movestart', () => pinEl.classList.add('moving'));
            addMap.on('move', () => { 
                const center = addMap.getCenter(); 
                addMap.currentLat = center.lat; 
                addMap.currentLng = center.lng; 
            });
            addMap.on('moveend', () => pinEl.classList.remove('moving'));
        }

        setTimeout(() => map.invalidateSize(), 500);

        const scrollList = document.getElementById('map-visible-list');
        let isDown = false, startX, scrollLeft;

        scrollList.addEventListener('mousedown', (e) => { 
            isDown = true; 
            startX = e.pageX - scrollList.offsetLeft; 
            scrollLeft = scrollList.scrollLeft; 
        });
        scrollList.addEventListener('mouseleave', () => isDown = false);
        scrollList.addEventListener('mouseup', () => isDown = false);
        scrollList.addEventListener('mousemove', (e) => { 
            if (!isDown) return; 
            e.preventDefault(); 
            scrollList.scrollLeft = scrollLeft - (e.pageX - scrollList.offsetLeft - startX) * 2; 
        });
        scrollList.addEventListener('wheel', (e) => { 
            if (e.deltaY !== 0) { 
                e.preventDefault(); 
                scrollList.scrollLeft += e.deltaY; 
            } 
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8mhgrQnPLqpXJI9Fq6_PvzxKBVUViLLg", 
            authDomain: "sciencetokyowater.firebaseapp.com",
            projectId: "sciencetokyowater", 
            storageBucket: "sciencetokyowater.firebasestorage.app",
            messagingSenderId: "1039095456448", 
            appId: "1:1039095456448:web:548ed9fcc01c811b470325"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app); 
        const storage = getStorage(app);
        
        let allSpots = []; 
        let userLocation = null; 
        let userMarker = null;
        let filterOpenOnly = false; 
        let previousView = 'view-map'; 
        window.currentDetailSpotId = null;

        const getById = id => document.getElementById(id);

        const escapeHTML = str => typeof str === 'string' ? str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m])) : '';

        const getDistance = (lat1, lon1, lat2, lon2) => { 
            const p = Math.PI / 180;
            const a = 0.5 - Math.cos((lat2 - lat1) * p) / 2 + Math.cos(lat1 * p) * Math.cos(lat2 * p) * (1 - Math.cos((lon2 - lon1) * p)) / 2;
            return 12742e3 * Math.asin(Math.sqrt(a)); 
        };

        const formatDistance = meters => meters < 1000 ? `${Math.round(meters)}m` : `${(meters / 1000).toFixed(1)}km`; 
        
        function isOpen(spot) {
            const hs = spot.available_hours || "24時間営業";
            if ((spot.closed_days || []).includes(new Date().getDay())) return false;
            if (hs.includes("24時間") || hs === "不明") return true;
            try {
                const ct = new Date().getHours() * 60 + new Date().getMinutes();
                const [s, e] = hs.replace(/[～~]/g, '-').split('-').map(t => {
                    const [h, m] = t.trim().split(':').map(Number);
                    return h * 60 + m;
                });
                if (isNaN(s) || isNaN(e)) return true;
                return s <= e ? (ct >= s && ct <= e) : (ct >= s || ct <= e);
            } catch { 
                return true; 
            }
        }

        const getClosedDaysText = c => (!c || !c.length) ? "" : `<span class="text-danger" style="margin-left:8px;">休: ${c.map(d => "日月火水木金土祝"[d]).join(',')}</span>`; 

        const createCustomIcon = c => L.divIcon({ 
            className: 'custom-pin', 
            html: `<svg viewBox="0 0 24 24" fill="${c}" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="4" fill="white"></circle></svg>`, 
            iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -34] 
        }); 

        const compressImage = (file, maxWidth = 800, quality = 0.7) => new Promise((resolve, reject) => {
            const reader = new FileReader(); 
            reader.onload = e => {
                const img = new Image(); 
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = img.width > maxWidth ? maxWidth / img.width : 1;
                    canvas.width = img.width * scale; 
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(resolve, 'image/webp', quality); 
                }; 
                img.onerror = reject;
                img.src = e.target.result;
            }; 
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

        function fetchCurrentLocation(btnEl, textElId, defaultText, callback) {
            if (!navigator.geolocation) return alert("お使いの端末は位置情報に対応していません。");
            
            const textEl = getById(textElId);
            btnEl.disabled = true; 
            textEl.innerText = "取得中...";
            
            navigator.geolocation.getCurrentPosition(
                pos => { 
                    userLocation = [pos.coords.latitude, pos.coords.longitude]; 
                    if(userMarker) map.removeLayer(userMarker); 
                    userMarker = L.circleMarker(userLocation, { radius: 8, fillColor: "#007AFF", color: "#FFFFFF", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map); 
                    btnEl.disabled = false; 
                    textEl.innerText = defaultText; 
                    if(callback) callback(true); 
                },
                () => { 
                    btnEl.disabled = false; 
                    textEl.innerText = defaultText; 
                    alert("位置情報の取得に失敗しました。"); 
                    if(callback) callback(false); 
                }, 
                { enableHighAccuracy: true, timeout: 20000, maximumAge: 10000 }
            );
        }

        getById('gps-btn').addEventListener('click', e => fetchCurrentLocation(e.currentTarget, 'gps-btn-text', '現在地周辺を検索', s => { 
            if(s) { map.flyTo(userLocation, 16); updateLists(); }
        }));
        
        getById('btn-get-location').addEventListener('click', e => fetchCurrentLocation(e.currentTarget, 'add-gps-text', '現在地を取得', s => { 
            if(s) addMap.flyTo(userLocation, 18) 
        }));
        
        let is24hMode = false; 
        const btn24h = getById('btn-24h'); 
        const inputHoursStart = getById('add-hours-start');
        const inputHoursEnd = getById('add-hours-end');

        btn24h.addEventListener('click', () => { 
            is24hMode = !is24hMode; 
            btn24h.classList.toggle('active', is24hMode);
            [inputHoursStart, inputHoursEnd].forEach(el => {
                el.disabled = is24hMode;
                if (is24hMode) { el.value = ''; el.removeAttribute('required'); }
                else el.setAttribute('required', 'true');
            });
        });

        window.flyToSpot = id => { 
            const spot = allSpots.find(s => s.id === id); 
            if (!spot) return; 
            document.querySelector('[data-target="view-map"]').click(); 
            map.flyTo([spot.latitude, spot.longitude], 18, { animate: true }); 
            setTimeout(() => spot.marker?.openPopup(), 800); 
        };

        window.showDetail = id => {
            const av = document.querySelector('.view-section.active'); 
            if (av && av.id !== 'view-detail') previousView = av.id;
            
            window.currentDetailSpotId = id; 
            const spot = allSpots.find(s => s.id === id); 
            if (!spot) return;
            
            getById('detail-title').innerText = spot.name;
            getById('detail-placename').innerHTML = `<span>${escapeHTML(spot.placename)}</span>` + (spot.floor ? `<span class="popup-floor">${escapeHTML(spot.floor)}</span>` : "");
            getById('detail-meta').innerHTML = `<span>${escapeHTML(spot.available_hours) || "24時間営業"}</span>${getClosedDaysText(spot.closed_days)}`;
            
            const imgEl = getById('detail-image'); 
            imgEl.src = spot.imageUrl || ''; 
            imgEl.style.display = spot.imageUrl ? 'block' : 'none'; 
            
            getById('detail-features').innerHTML = (spot.features||[]).map(f => `<span class="feature-badge">${escapeHTML(f)}</span>`).join('');
            
            loadComments(id);
            
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active')); 
            getById('view-detail').classList.add('active'); 
            window.scrollTo(0, 0);
        };

        window.goBack = () => document.querySelector(`[data-target="${previousView}"]`).click(); 
        window.flyToSpotFromDetail = () => window.currentDetailSpotId && flyToSpot(window.currentDetailSpotId); 

        const createListCard = (spot, onClick) => {
            const os = isOpen(spot); 
            const dt = spot.distance ? `<span class="dist-badge">${formatDistance(spot.distance)}</span>` : "";
            const fh = (spot.features||[]).map(f => `<span class="feature-badge">${escapeHTML(f)}</span>`).join('');
            return `
            <div class="spot-card clickable-card" onclick="${onClick}('${spot.id}')">
                <span class="status-badge ${os ? 'status-open' : 'status-closed'}">${os ? '営業中' : '時間外'}</span>
                <div class="popup-placename mb-sm">
                    <span>${escapeHTML(spot.placename)}</span> 
                    ${spot.floor ? `<span class="popup-floor">${escapeHTML(spot.floor)}</span>`:""}
                </div>
                <div class="spot-title">${escapeHTML(spot.name)}</div>
                <div class="mb-sm mt-sm">${fh}</div>
                <div class="spot-meta">${dt}<span>${escapeHTML(spot.available_hours)||"24時間営業"}</span>${getClosedDaysText(spot.closed_days)}</div>
            </div>`;
        };

        const createCompactCard = (spot, onClick) => {
            const os = isOpen(spot); 
            const dt = spot.distance ? `<span class="dist-badge">${formatDistance(spot.distance)}</span>` : "";
            return `
            <div class="spot-card compact clickable-card" onclick="${onClick}('${spot.id}')">
                <span class="status-badge ${os ? 'status-open' : 'status-closed'}">${os ? '営業中' : '時間外'}</span>
                <div class="popup-placename"><span>${escapeHTML(spot.placename)}</span></div>
                <div class="spot-title">${escapeHTML(spot.name)}</div>
                <div class="spot-meta">${dt}<span>${escapeHTML(spot.available_hours)||"24時間営業"}</span></div>
            </div>`;
        };

        function updateLists() {
            const b = map.getBounds();
            const vSpots = allSpots.filter(s => b.contains(L.latLng(s.latitude, s.longitude)));
            getById("map-visible-list").innerHTML = vSpots.length ? vSpots.map(s => createCompactCard(s, 'flyToSpot')).join('') : `<div class="empty-message-pill">このエリアに見つかりませんでした</div>`;
            
            const sortBy = getById("sort-select").value;
            let dSpots = allSpots.map(s => ({...s, distance: userLocation ? getDistance(userLocation[0], userLocation[1], s.latitude, s.longitude) : s.distance}));
            if (filterOpenOnly) dSpots = dSpots.filter(isOpen);
            dSpots.sort((a, b) => (sortBy === "distance" && userLocation) ? a.distance - b.distance : a.name.localeCompare(b.name, 'ja'));
            
            getById("full-spot-list").innerHTML = dSpots.map(s => createListCard(s, 'showDetail')).join('') || "<p class='text-center text-sub mt-lg'>条件に合うスポットがありません</p>";
            
            allSpots.forEach(s => { 
                const isOp = isOpen(s);
                s.marker.setIcon(createCustomIcon(isOp ? "var(--success)" : "var(--pin-default)"));
                if (!filterOpenOnly || isOp) { 
                    if (!map.hasLayer(s.marker)) s.marker.addTo(map); 
                } else map.removeLayer(s.marker); 
            });
        }

        window.loadSpots = async () => {
            try {
                const snap = await getDocs(query(collection(db, "spots"), where("approved", "==", true)));
                allSpots.forEach(s => s.marker && map.removeLayer(s.marker)); 
                allSpots = [];
                snap.forEach(doc => {
                    const spot = { ...doc.data(), id: doc.id };
                    if (spot.latitude && spot.longitude) {
                        spot.marker = L.marker([spot.latitude, spot.longitude], { icon: createCustomIcon(isOpen(spot) ? "var(--success)" : "var(--pin-default)") })
                            .bindPopup(`<div class="custom-popup"><div class="popup-placename"><span>${escapeHTML(spot.placename)}</span></div><div class="popup-title">${escapeHTML(spot.name)}</div><button class="popup-btn" onclick="showDetail('${spot.id}')">詳細を見る</button></div>`)
                            .addTo(map);
                        allSpots.push(spot);
                    }
                });
                updateLists();
            } catch (err) { 
                console.error(err); 
                getById("full-spot-list").innerHTML = "<p class='text-center text-danger mt-lg'>データの読み込みに失敗しました。</p>"; 
            }
        };

        map.on('moveend', updateLists);
        
        getById("sort-select").addEventListener('change', e => { 
            if (e.target.value === "distance" && !userLocation) { 
                if (confirm("現在地に近い順に並び替えるには、位置情報を取得しますか？")) { 
                    fetchCurrentLocation(getById('gps-btn'), 'gps-btn-text', '現在地周辺を検索', s => { 
                        if(s) { e.target.value = "distance"; updateLists(); } else e.target.value = "default";
                    }); 
                } else e.target.value = "default"; 
            } else updateLists(); 
        });
        
        getById("filter-open").addEventListener('click', e => { 
            filterOpenOnly = !filterOpenOnly; 
            e.currentTarget.classList.toggle('active'); 
            updateLists(); 
        });

        getById('add-spot-form').addEventListener('submit', async e => {
            e.preventDefault(); 
            const btn = getById('submit-btn'); 
            btn.disabled = true; btn.innerText = "送信中...";
            
            try {
               const name = getById('add-name').value; 
               const placename = getById('add-placename').value; 
               const floor = getById('add-floor').value; 
               const hours = is24hMode ? "24時間営業" : `${getById('add-hours-start').value} - ${getById('add-hours-end').value}`;
               const features = [...document.querySelectorAll('input[name="features"]:checked')].map(cb => cb.value);
               const closed_days = [...document.querySelectorAll('input[name="closed_days"]:checked')].map(cb => parseInt(cb.value));
                
                let imageUrl = null; 
                const fileInput = getById('add-image');
                
                if (fileInput.files.length) { 
                    try {
                        const blob = await compressImage(fileInput.files[0]);
                        const sRef = ref(storage, `spots/${Date.now()}_${Math.random().toString(36).substring(2, 8)}.webp`); 
                        await uploadBytes(sRef, blob); 
                        imageUrl = await getDownloadURL(sRef); 
                    } catch (err) { alert("画像のアップロードに失敗しました。画像なしで登録します。"); }
                }
                
                await addDoc(collection(db, "spots"), { 
                    name, placename, floor, available_hours: hours, features, closed_days, 
                    latitude: addMap.currentLat, longitude: addMap.currentLng, imageUrl, approved: false, created_at: serverTimestamp() 
                });
                
                alert("申請が完了しました。管理者の承認後にマップに反映されます。"); 
                e.target.reset(); 
                if(is24hMode) btn24h.click(); 
                document.querySelector('[data-target="view-map"]').click();
            } catch (err) { alert("送信中にエラーが発生しました。"); } 
            finally { btn.disabled = false; btn.innerText = "この内容で申請する"; }
        });

        const toggleModal = (show) => {
            getById('report-modal').style.display = show ? 'flex' : 'none';
            if (!show) getById('report-text').value = '';
        };
        window.openReportModal = () => toggleModal(true);
        window.closeReportModal = () => toggleModal(false);

        window.submitReport = async () => {
            const txt = getById('report-text').value; 
            if(!txt) return alert("詳細を入力してください。");
            const btn = getById('submit-report-btn');
            btn.disabled = true; btn.innerText = "送信中...";
            try { 
                await addDoc(collection(db, "reports"), { spotId: window.currentDetailSpotId, category: getById('report-category').value, text: txt, created_at: serverTimestamp(), resolved: false }); 
                alert("報告を送信しました。ご協力ありがとうございます。"); 
                closeReportModal(); 
            } catch { alert("送信に失敗しました。"); } 
            finally { btn.disabled = false; btn.innerText = "送信"; }
        };

        const loadComments = async spotId => {
            const list = getById('detail-comments-list'); 
            list.innerHTML = '<p class="text-sub">読込中...</p>';
            try { 
                const snap = await getDocs(collection(db, "spots", spotId, "comments")); 
                let cmts = []; 
                snap.forEach(d => cmts.push(d.data())); 
                cmts.sort((a, b) => (a.created_at?.toMillis() || Date.now()) - (b.created_at?.toMillis() || Date.now())); 
                list.innerHTML = cmts.length ? cmts.map(c => `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-name">${escapeHTML(c.name)||'名無しさん'}</span>
                            <span class="text-sub">${new Date(c.created_at?.toMillis()||Date.now()).toLocaleString('ja-JP')}</span>
                        </div>
                        <div class="comment-text">${escapeHTML(c.text)}</div>
                    </div>`).join('') : '<p class="text-sub">まだコメントはありません。</p>'; 
            } catch { list.innerHTML = '<p class="text-danger">読み込みに失敗しました</p>'; }
        };
        
        getById('add-comment-form').addEventListener('submit', async e => { 
            e.preventDefault(); 
            if(!window.currentDetailSpotId) return; 
            const btn = getById('submit-comment-btn'); 
            btn.disabled = true; btn.innerText = "送信中..."; 
            try { 
                await addDoc(collection(db,"spots",window.currentDetailSpotId,"comments"), { name: getById('comment-name').value, text: getById('comment-text').value, created_at: serverTimestamp() }); 
                e.target.reset(); 
                await loadComments(window.currentDetailSpotId); 
                btn.innerText = "完了"; 
                setTimeout(() => { btn.disabled=false; btn.innerText="コメントを送信"; }, 2000); 
            } catch { alert('送信に失敗しました'); btn.disabled=false; btn.innerText="コメントを送信"; } 
        });

        loadSpots();

        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active')); 
                item.classList.add('active');
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                
                const tid = item.dataset.target; 
                if (tid !== 'view-detail') previousView = tid;
                getById(tid).classList.add('active');
                
                if (tid === 'view-map') requestAnimationFrame(() => map.invalidateSize());
                if (tid === 'view-add') { initAddMap(); setTimeout(() => addMap?.invalidateSize(), 100); }
                window.scrollTo(0, 0);
            });
        });
    </script>

</body>
</html>
