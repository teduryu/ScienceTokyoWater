<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="pwaicon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1c3177">
    <title>ScienceTokyoWater</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        :root {
            --science-blue: #1c3177; --science-sub: #7f96c2; --bg-color: #f2f4f9;
            --bg-darker: #e8eaf1; --accent-red: #f02b2b; --accent-green: #2b9e4a;
            --card-bg: #FFFFFF; --text-main: #222222; --text-sub: #707070;
            --pin-hot: #f02b2b; --pin-machine: #1c3177; --pin-tap: #00a8ff; --pin-default: #7f96c2;
        }

        body {
            font-family: 'Hind', 'Noto Sans JP', sans-serif; margin: 0; padding: 0;
            background-color: var(--bg-color); color: var(--text-main);
            padding-top: 60px; padding-bottom: calc(70px + env(safe-area-inset-bottom));
            -webkit-font-smoothing: antialiased; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            height: 60px; font-size: 1.15rem; font-weight: 700;
            color: var(--science-blue); position: fixed; top: 0; left: 0; right: 0;
            z-index: 2000; box-shadow: 0 1px 0 rgba(28, 49, 119, 0.1); letter-spacing: 0.02em; user-select: none;
        }
        .header-logo { width: 24px; height: 24px; margin-right: 8px; object-fit: contain; border-radius: 4px; }

        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; height: 100%; min-height: calc(100vh - 140px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* マップ関連 */
        #view-map.active { position: fixed; top: 0; left: 0; right: 0; bottom: 0; padding: 0; z-index: 10; }
        #map { width: 100%; height: 100%; z-index: 1; background-color: #e5e3df; }
        .leaflet-top { top: 65px !important; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 8px 24px rgba(28,49,119,0.15); }
        .leaflet-popup-content { margin: 14px; font-family: 'Hind', 'Noto Sans JP', sans-serif; width: 220px !important; }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-sub); top: 8px; right: 8px; font-size: 1.2rem; padding: 4px; }
        
        .custom-popup { display: flex; flex-direction: column; gap: 4px; }
        .popup-placename { font-size: 0.75rem; color: var(--science-sub); font-weight: 600; display: flex; gap:4px; align-items: center; line-height: 1.2; }
        .popup-floor { background: var(--bg-color); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; color: var(--science-blue); font-weight: 700; border: 1px solid var(--bg-darker); white-space: nowrap; }
        .popup-title { font-size: 1.05rem; font-weight: 800; color: var(--science-blue); line-height: 1.3; margin-bottom: 2px; }
        .popup-btn { background: var(--bg-color); border: 1px solid var(--bg-darker); color: var(--science-blue); font-weight: 700; padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s ease; font-size: 0.85rem; margin-top: 6px; width: 100%; }

        .custom-pin { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); display: flex; align-items: center; justify-content: center; }
        .custom-pin svg { width: 100%; height: 100%; }

        .floating-ui-top { position: absolute; top: 76px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .floating-btn { width: auto; padding: 10px 20px; font-size: 0.85rem; border-radius: 30px; box-shadow: 0 6px 16px rgba(28, 49, 119, 0.25); white-space: nowrap; pointer-events: auto; font-weight: 700; display: flex; align-items: center; gap: 6px; background: var(--science-blue); color: white; border: none; cursor: pointer;}
        
        .floating-ui-bottom { position: absolute; bottom: calc(75px + env(safe-area-inset-bottom)); left: 0; width: 100%; z-index: 1000; pointer-events: none; }
        .horizontal-scroll-list { pointer-events: auto; display: flex; gap: 12px; overflow-x: auto; padding: 10px 16px 20px 16px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .horizontal-scroll-list::-webkit-scrollbar { display: none; }
        #map-visible-list .spot-card { pointer-events: auto; flex: 0 0 85%; scroll-snap-align: center; margin-bottom: 0; padding: 14px; border-radius: 16px; max-width: 320px; }
        .empty-message-pill { pointer-events: auto; background: rgba(255,255,255,0.98); padding: 12px 24px; border-radius: 30px; margin: 0 auto; font-size: 0.85rem; font-weight: 700; color: var(--text-sub); box-shadow: 0 8px 20px rgba(28, 49, 119, 0.1); border: 1px solid var(--bg-darker); }

        /* 共通ボタン・UI */
        .btn-large { pointer-events: auto; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--science-blue); color: white; border: none; padding: 14px; font-size: 0.95rem; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: inherit; transition: background 0.2s ease; }
        .btn-large:active { background: #15265b; }
        .btn-large:disabled { background: var(--science-sub); cursor: not-allowed; }
        .btn-secondary { background: var(--bg-color); border: 1px solid var(--bg-darker); color: var(--science-blue); box-shadow: none; }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; color: white;}

        .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .control-item { background: white; padding: 10px 16px; border-radius: 30px; font-size: 0.85rem; border: 1px solid var(--science-sub); color: var(--science-blue); cursor: pointer; font-family: inherit; font-weight: 600; display: flex; align-items: center; justify-content: center;}
        .control-item.active { background: var(--science-blue); color: white; border-color: var(--science-blue); }

        .section-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 16px 0; color: var(--science-blue); }

        /* スポットカード */
        .spot-card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(28, 49, 119, 0.06); position: relative; border: 1px solid var(--bg-darker); }
        .clickable-card { cursor: pointer; transition: background-color 0.2s ease; }
        .spot-meta { font-size: 0.8rem; color: var(--text-sub); display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .dist-badge { background: var(--bg-darker); padding: 2px 6px; border-radius: 4px; font-weight: 600; color: var(--science-blue); }
        .closed-days { color: var(--accent-red); font-weight: 600; font-size: 0.85em; }
        .status-badge { position: absolute; top: 16px; right: 16px; padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; }
        .status-open { background: #eef7f0; color: var(--accent-green); }
        .status-closed { background: #fdf0f0; color: var(--accent-red); }
        .spot-title { font-size: 1.1rem; font-weight: 800; margin: 4px 0 6px 0; color: var(--text-main); line-height: 1.3; display: flex; align-items: center; gap: 6px; }

        /* フォーム */
        form label { display: block; margin-top: 20px; margin-bottom: 8px; font-size: 0.85rem; color: var(--science-blue); font-weight: 700; }
        form input[type="text"], form input[type="file"], form textarea, select { width: 100%; padding: 12px; border: 1px solid var(--science-sub); border-radius: 8px; font-family: inherit; box-sizing: border-box; font-size: 0.95rem; background: white; }
        .input-group { display: flex; gap: 8px; }

        .feature-badge { display: inline-block; padding: 4px 8px; background: var(--bg-color); color: var(--science-sub); border: 1px solid var(--bg-darker); border-radius: 6px; font-size: 0.75rem; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
        .feature-checkbox, .day-checkbox { display: none; }
        .feature-label { display: inline-block; padding: 8px 12px; background: var(--bg-color); border: 1px solid var(--bg-darker); border-radius: 8px; font-size: 0.85rem; color: var(--text-sub); cursor: pointer; font-weight: 600; }
        .feature-checkbox:checked + .feature-label { background: var(--science-blue); color: white; border-color: var(--science-blue); }
        .features-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        
        .days-grid { display: flex; flex-wrap: nowrap; gap: 4px; margin-bottom: 12px; width: 100%; }
        .day-label { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 0; background: var(--bg-color); border: 1px solid var(--bg-darker); border-radius: 6px; font-size: 0.8rem; color: var(--text-sub); cursor: pointer; font-weight: 600;}
        .day-checkbox:checked + .day-label { background: var(--science-blue); color: white; border-color: var(--science-blue); }

        .add-map-container { position: relative; height: 200px; width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--science-sub); margin-bottom: 8px; background-color: #e5e3df; }
        .center-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 1000; pointer-events: none; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); transition: transform 0.1s; }
        .center-pin.moving { transform: translate(-50%, -120%); }

        /* 詳細ページ */
        .detail-image { width: 100%; height: 240px; object-fit: cover; border-radius: 12px; margin-bottom: 16px; background-color: var(--bg-color); border: 1px solid var(--bg-darker); }
        .detail-back-btn { background: none; border: none; color: var(--text-sub); font-size: 1.05rem; font-weight: bold; padding: 8px 0; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        
        .comment-item { background: var(--bg-color); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--bg-darker); }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .comment-name { font-size: 0.85rem; font-weight: 700; color: var(--science-blue); }
        .comment-date { font-size: 0.7rem; color: var(--text-sub); }
        .comment-text { font-size: 0.9rem; white-space: pre-wrap; color: var(--text-main); line-height: 1.5; }
        #detail-comments-list { margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding-right: 4px; }

        /* モーダル */
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px); }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top:0; color: var(--science-blue); font-size:1.2rem; margin-bottom: 16px;}

        /* フッター */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0; box-shadow: 0 -2px 15px rgba(28,49,119,0.08); z-index: 2000; border-top: 1px solid var(--bg-darker); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #99a5c1; width: 33%; cursor: pointer; transition: color 0.2s ease; font-weight: 600; padding: 4px 0;}
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; stroke: currentColor; transition: transform 0.2s ease; }
        .nav-item.active { color: var(--science-blue); }
        .nav-item.active svg { transform: translateY(-2px); stroke-width: 2.5px; }
    </style>
</head>
<body>

    <header id="app-header">
        <img src="menuicon.png" alt="Logo" class="header-logo">
        ScienceTokyoWater
    </header>

    <div id="view-map" class="view-section active">
        <div id="map"></div>
        <div class="floating-ui-top">
            <button id="gps-btn" class="floating-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                現在地周辺を検索
            </button>
        </div>
        <div class="floating-ui-bottom"><div id="map-visible-list" class="horizontal-scroll-list"></div></div>
    </div>

    <div class="container view-section" id="view-list">
        <h2 class="section-title">スポット一覧</h2>
        <div class="controls">
            <select id="sort-select" class="control-item" style="appearance: none; padding-right: 24px;">
                <option value="default">名前順</option>
                <option value="distance">現在地に近い順</option>
            </select>
            <div id="filter-open" class="control-item"><span style="display:inline-block; width:8px; height:8px; background:var(--accent-green); border-radius:50%; margin-right:6px;"></span>営業中のみ</div>
        </div>
        <div id="full-spot-list"><p style="text-align: center; color: var(--text-sub);">読み込み中...</p></div>
    </div>

    <div class="container view-section" id="view-add">
        <h2 class="section-title">新規スポットの追加</h2>
        <p style="font-size: 0.85rem; color: var(--text-sub); margin-bottom: 20px;">見つけた給水スポットを登録して共有しましょう。<br><span style="color:var(--accent-red); font-weight:600;">※管理者の承認後にマップに表示されます。</span></p>
        
        <div class="spot-card" style="padding: 20px;">
            <form id="add-spot-form">
                <label>スポット名 (必須)</label><input type="text" id="add-name" required placeholder="例: 西3号館 ウォーターサーバー">
                <label>建物名・エリア と 階数 (必須)</label>
                <div class="input-group">
                    <input type="text" id="add-placename" required placeholder="建物名 (例: 本館)" style="flex: 2;">
                    <input type="text" id="add-floor" placeholder="階数 (例: 3階)" style="flex: 1;">
                </div>

                <label>場所の指定 (地図を動かしてピンを合わせる)</label>
                <div class="add-map-container">
                    <div id="add-map" style="width: 100%; height: 100%; z-index: 1;"></div>
                    <div id="center-pin" class="center-pin">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--accent-red)" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>
                    </div>
                </div>
                <button type="button" id="btn-get-location" class="btn-large btn-secondary" style="padding: 10px; font-size: 0.9rem;">📍 現在地を取得</button>

                <label>特徴 (複数選択可)</label>
                <div class="features-grid">
                    <input type="checkbox" id="f1" name="features" value="給水機" class="feature-checkbox"><label for="f1" class="feature-label">給水機</label>
                    <input type="checkbox" id="f2" name="features" value="蛇口" class="feature-checkbox"><label for="f2" class="feature-label">蛇口</label>
                    <input type="checkbox" id="f3" name="features" value="お湯" class="feature-checkbox"><label for="f3" class="feature-label">お湯</label>
                </div>

                <label>利用可能時間 (必須)</label>
                <div class="input-group" style="margin-bottom:12px;">
                    <input type="text" id="add-hours" placeholder="例: 09:00 - 18:00" style="flex:1;">
                    <button type="button" id="btn-24h" class="control-item" style="margin:0;">24時間営業</button>
                </div>

                <label>休業日</label>
                <div class="days-grid">
                    <input type="checkbox" id="d1" name="closed_days" value="1" class="day-checkbox"><label for="d1" class="day-label">月</label>
                    <input type="checkbox" id="d2" name="closed_days" value="2" class="day-checkbox"><label for="d2" class="day-label">火</label>
                    <input type="checkbox" id="d3" name="closed_days" value="3" class="day-checkbox"><label for="d3" class="day-label">水</label>
                    <input type="checkbox" id="d4" name="closed_days" value="4" class="day-checkbox"><label for="d4" class="day-label">木</label>
                    <input type="checkbox" id="d5" name="closed_days" value="5" class="day-checkbox"><label for="d5" class="day-label">金</label>
                    <input type="checkbox" id="d6" name="closed_days" value="6" class="day-checkbox"><label for="d6" class="day-label">土</label>
                    <input type="checkbox" id="d0" name="closed_days" value="0" class="day-checkbox"><label for="d0" class="day-label">日</label>
                    <input type="checkbox" id="d7" name="closed_days" value="7" class="day-checkbox"><label for="d7" class="day-label">祝</label>
                </div>

                <label>画像 (任意 / 自動圧縮)</label>
                <input type="file" id="add-image" accept="image/*">
                <button type="submit" id="submit-btn" class="btn-large" style="margin-top:24px;">この内容で申請する</button>
            </form>
        </div>
    </div>

    <div id="view-detail" class="view-section">
        <div class="container">
            <button class="detail-back-btn" onclick="goBack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 19 5 12 12 5"></polyline></svg> 戻る</button>
            <div class="spot-card" style="padding: 20px; margin-bottom: 30px;">
                <img id="detail-image" class="detail-image" src="" alt="スポット画像" style="display:none;">
                <div id="detail-placename" class="spot-placename" style="font-size: 0.9rem; display:flex; gap:6px; align-items:center;"></div>
                <h2 id="detail-title" class="spot-title" style="font-size: 1.5rem; margin: 8px 0;"></h2>
                <div id="detail-features" style="margin-bottom: 16px;"></div>
                <div id="detail-meta" class="spot-meta" style="font-size: 1rem; margin-bottom: 16px; font-weight: 500;"></div>
                
                <button class="btn-large btn-secondary" onclick="flyToSpotFromDetail()">地図で確認する</button>
                
                <button class="btn-large btn-secondary" onclick="openReportModal()" style="margin-top:12px; border-color:var(--accent-red); color:var(--accent-red); background:#fdf0f0;">🚨 情報の修正・問題を報告</button>

                <div style="margin-top: 30px; border-top: 1px solid var(--bg-darker); padding-top: 20px;">
                    <h3 class="section-title">コメント</h3>
                    <div id="detail-comments-list"></div>
                    <form id="add-comment-form" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                        <input type="text" id="comment-name" placeholder="お名前 (省略可)">
                        <textarea id="comment-text" required placeholder="コメントを入力..." style="resize: vertical; min-height: 80px;"></textarea>
                        <button type="submit" id="submit-comment-btn" class="btn-large">送信する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="view-admin" class="view-section">
        <div class="container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 class="section-title" style="color:#d35400;">👑 管理者ダッシュボード</h2>
                <button onclick="closeAdmin()" class="btn-small" style="background:var(--science-sub);">閉じる</button>
            </div>
            
            <h3 style="font-size:1rem; margin-top:20px; padding-bottom:4px; border-bottom:2px solid var(--science-blue);">承認待ちスポット</h3>
            <div id="admin-unapproved-list" style="margin-bottom:30px;"></div>

            <h3 style="font-size:1rem; margin-top:20px; padding-bottom:4px; border-bottom:2px solid var(--accent-red);">ユーザーからの報告</h3>
            <div id="admin-reports-list"></div>
        </div>
    </div>

    <div id="report-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>問題の報告</h3>
            <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:12px;">スポットに問題がある場合はお知らせください。</p>
            <select id="report-category" style="margin-bottom:12px;">
                <option value="撤去・閉鎖">撤去・閉鎖されている</option>
                <option value="情報の誤り">場所や時間などが間違っている</option>
                <option value="その他">その他</option>
            </select>
            <textarea id="report-text" placeholder="詳細をご記入ください" style="resize: vertical; min-height:80px;"></textarea>
            <div style="display:flex; gap:10px; margin-top:16px;">
                <button onclick="closeReportModal()" class="btn-large btn-secondary">キャンセル</button>
                <button onclick="submitReport()" class="btn-large" id="submit-report-btn">送信</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-target="view-map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg><span>マップ</span>
        </div>
        <div class="nav-item" data-target="view-list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg><span>リスト</span>
        </div>
        <div class="nav-item" data-target="view-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg><span>追加</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        const MAP_TILE_URL = 'https://tile.tracestrack.com/ja/{z}/{x}/{y}.png?key=27e171dc5ca2cc214ecf5ab9d0f493bd';
        const MAP_ATTRIBUTION = '&copy; OpenStreetMap contributors, Tiles &copy; Tracestrack';
        
        const map = L.map('map', { zoomControl: false }).setView([35.6061, 139.6833], 16);
        L.tileLayer(MAP_TILE_URL, { maxZoom: 19, attribution: MAP_ATTRIBUTION }).addTo(map);

        let addMap = null;
        function initAddMap() {
            if (addMap) return;
            addMap = L.map('add-map', { zoomControl: false }).setView([35.6061, 139.6833], 16);
            L.tileLayer(MAP_TILE_URL, { maxZoom: 19 }).addTo(addMap);
            
            const pinEl = document.getElementById('center-pin');
            addMap.currentLat = 35.6061; addMap.currentLng = 139.6833;
            addMap.on('movestart', () => pinEl.classList.add('moving'));
            addMap.on('move', () => { const center = addMap.getCenter(); addMap.currentLat = center.lat; addMap.currentLng = center.lng; });
            addMap.on('moveend', () => pinEl.classList.remove('moving'));
        }
        setTimeout(() => { map.invalidateSize(); }, 500);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8mhgrQnPLqpXJI9Fq6_PvzxKBVUViLLg",
            authDomain: "sciencetokyowater.firebaseapp.com",
            projectId: "sciencetokyowater",
            storageBucket: "sciencetokyowater.firebasestorage.app",
            messagingSenderId: "1039095456448",
            appId: "1:1039095456448:web:548ed9fcc01c811b470325"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let allSpots = []; let userLocation = null; let userMarker = null;
        let filterOpenOnly = false; let previousView = 'view-map'; window.currentDetailSpotId = null;

        // --- 共通機能 ---
        function escapeHTML(str) { return typeof str === 'string' ? str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m])) : ''; }
        function getDistance(lat1, lon1, lat2, lon2) { const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180; const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180; const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2); return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        function formatDistance(meters) { return meters < 1000 ? `${Math.round(meters)}m` : `${(meters / 1000).toFixed(1)}km`; }
        function isOpen(spot) { const hs = spot.available_hours || "24時間営業"; const cd = new Date().getDay(); if ((spot.closed_days || []).includes(cd)) return false; if (hs.includes("24時間") || hs === "不明") return true; try { const ct = new Date().getHours() * 60 + new Date().getMinutes(); const p = hs.split('-'); const s = p[0].trim().split(':').map(Number); const e = p[1].trim().split(':').map(Number); return ct >= (s[0]*60+s[1]) && ct <= (e[0]*60+e[1]); } catch { return true; } }
        function getClosedDaysText(c) { return (!c || c.length===0) ? "" : `<span class="closed-days">休: ${c.map(d => ["日","月","火","水","木","金","土","祝"][d]).join(',')}</span>`; }
        function getPinColor(f) { if (!f) return "var(--pin-default)"; if (f.includes("お湯")) return "var(--pin-hot)"; if (f.includes("給水機")) return "var(--pin-machine)"; if (f.includes("蛇口")) return "var(--pin-tap)"; return "var(--pin-default)"; }
        function createCustomIcon(c) { return L.divIcon({ className: 'custom-pin', html: `<svg viewBox="0 0 24 24" fill="${c}" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>`, iconSize: [34,34], iconAnchor: [17,34], popupAnchor: [0,-32] }); }

        window.flyToSpot = function(id) {
            const spot = allSpots.find(s => s.id === id); if (!spot) return;
            document.querySelector('[data-target="view-map"]').click();
            map.flyTo([spot.latitude, spot.longitude], 18, { animate: true });
            setTimeout(() => { if (spot.marker) spot.marker.openPopup(); }, 800);
        }

        window.showDetail = function(id) {
            const av = document.querySelector('.view-section.active');
            if (av && av.id !== 'view-detail' && av.id !== 'view-admin') previousView = av.id;
            window.currentDetailSpotId = id; const spot = allSpots.find(s => s.id === id); if (!spot) return;
            
            document.getElementById('detail-title').innerText = spot.name;
            document.getElementById('detail-placename').innerHTML = `<span>${escapeHTML(spot.placename)}</span>` + (spot.floor ? `<span class="popup-floor">${escapeHTML(spot.floor)}</span>` : "");
            document.getElementById('detail-meta').innerHTML = `<span>${escapeHTML(spot.available_hours) || "24時間営業"}</span>${getClosedDaysText(spot.closed_days)}`;
            
            const imgEl = document.getElementById('detail-image');
            if (spot.imageUrl) { imgEl.src = spot.imageUrl; imgEl.style.display = 'block'; } else { imgEl.style.display = 'none'; }
            
            document.getElementById('detail-features').innerHTML = (spot.features||[]).map(f => `<span class="feature-badge">${escapeHTML(f)}</span>`).join('');
            loadComments(id);
            
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-detail').classList.add('active'); window.scrollTo(0, 0);
        }

        window.goBack = function() { document.querySelector(`[data-target="${previousView}"]`).click(); }
        window.flyToSpotFromDetail = function() { if (currentDetailSpotId) flyToSpot(currentDetailSpotId); }

        function createCard(spot, onClickAction) {
            const os = isOpen(spot); const dt = spot.distance ? `<span class="dist-badge">${formatDistance(spot.distance)}</span>` : "";
            const fh = (spot.features||[]).map(f => `<span class="feature-badge">${escapeHTML(f)}</span>`).join('');
            return `<div class="spot-card clickable-card" onclick="${onClickAction}('${spot.id}')">
                <span class="status-badge ${os ? 'status-open' : 'status-closed'}">${os ? '営業中' : '時間外'}</span>
                <div class="popup-placename" style="margin-bottom:6px;"><span>${escapeHTML(spot.placename)}</span> ${spot.floor ? `<span class="popup-floor">${escapeHTML(spot.floor)}</span>`:""}</div>
                <div class="spot-title"><b>${escapeHTML(spot.name)}</b></div>
                <div style="margin-bottom:8px; margin-top:6px;">${fh}</div>
                <div class="spot-meta">${dt}<span>${escapeHTML(spot.available_hours)||"24時間営業"}</span>${getClosedDaysText(spot.closed_days)}</div>
            </div>`;
        }

        function updateLists() {
            const mList = document.getElementById("map-visible-list"); const b = map.getBounds();
            const vSpots = allSpots.filter(s => b.contains(L.latLng(s.latitude, s.longitude)));
            mList.innerHTML = vSpots.length ? vSpots.map(s => createCard(s, 'flyToSpot')).join('') : `<div class="empty-message-pill">このエリアに見つかりませんでした</div>`;

            const fList = document.getElementById("full-spot-list"); const sortBy = document.getElementById("sort-select").value;
            let dSpots = [...allSpots];
            if (userLocation) dSpots.forEach(s => s.distance = getDistance(userLocation[0], userLocation[1], s.latitude, s.longitude));
            if (filterOpenOnly) dSpots = dSpots.filter(s => isOpen(s));
            if (sortBy === "distance" && userLocation) dSpots.sort((a, b) => a.distance - b.distance); else dSpots.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            fList.innerHTML = dSpots.map(s => createCard(s, 'showDetail')).join('') || "<p style='text-align:center; padding:40px;'>条件に合うスポットがありません</p>";

            allSpots.forEach(spot => { const v = filterOpenOnly ? isOpen(spot) : true; if (v) { if (!map.hasLayer(spot.marker)) spot.marker.addTo(map); } else { if (map.hasLayer(spot.marker)) map.removeLayer(spot.marker); } });
        }

        window.loadSpots = async function() {
            try {
                const snap = await getDocs(collection(db, "spots"));
                allSpots.forEach(s => { if(s.marker) map.removeLayer(s.marker); }); allSpots = [];
                
                snap.forEach(doc => {
                    const spot = doc.data(); spot.id = doc.id;
                    if (spot.latitude && spot.longitude && spot.approved !== false) {
                        const m = L.marker([spot.latitude, spot.longitude], { icon: createCustomIcon(getPinColor(spot.features)) });
                        m.bindPopup(`<div class="custom-popup"><div class="popup-placename"><span>${escapeHTML(spot.placename)}</span></div><div class="popup-title">${escapeHTML(spot.name)}</div><button class="popup-btn" onclick="showDetail('${spot.id}')">詳細を見る</button></div>`);
                        spot.marker = m; m.addTo(map); allSpots.push(spot);
                    }
                });
                updateLists();
            } catch (err) { console.error(err); }
        }

        map.on('moveend', updateLists);
        document.getElementById("sort-select").addEventListener('change', (e) => { if (e.target.value === "distance" && !userLocation) { if(confirm("現在地を取得しますか？")) document.getElementById('gps-btn').click(); else e.target.value = "default"; } else updateLists(); });
        document.getElementById("filter-open").addEventListener('click', (e) => { filterOpenOnly = !filterOpenOnly; e.currentTarget.classList.toggle('active'); updateLists(); });

        // --- 管理者モード (ヘッダー5回タップ) ---
        let headerClickCount = 0; let headerTimer;
        document.getElementById('app-header').addEventListener('click', () => {
            headerClickCount++; clearTimeout(headerTimer);
            headerTimer = setTimeout(() => { headerClickCount = 0; }, 1500);
            if(headerClickCount >= 5) {
                headerClickCount = 0;
                const pass = prompt("管理者パスワードを入力してください");
                if(pass === "admin123") openAdmin();
                else if(pass !== null) alert("パスワードが違います");
            }
        });

        function openAdmin() {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-admin').classList.add('active'); loadAdminData();
        }
        window.closeAdmin = function() { document.querySelector('[data-target="view-map"]').click(); }

        window.loadAdminData = async function() {
            const uDiv = document.getElementById('admin-unapproved-list'); const rDiv = document.getElementById('admin-reports-list');
            uDiv.innerHTML = "読込中..."; rDiv.innerHTML = "読込中...";
            try {
                const snap = await getDocs(collection(db, "spots")); let unapp = [];
                snap.forEach(d => { const dt = d.data(); if(dt.approved === false) unapp.push({id: d.id, ...dt}); });
                uDiv.innerHTML = unapp.length ? unapp.map(s => `
                    <div class="spot-card"><b>${escapeHTML(s.name)}</b> (${escapeHTML(s.placename)})<br><small>${escapeHTML(s.available_hours)} | ${(s.features||[]).join(',')}</small>
                    <div style="display:flex;gap:8px;margin-top:8px;"><button class="btn-small" style="background:var(--accent-green);" onclick="approveSpot('${s.id}')">承認</button><button class="btn-small" style="background:var(--accent-red);" onclick="deleteSpot('${s.id}')">削除</button></div></div>
                `).join('') : "<p>承認待ちのスポットはありません。</p>";
                
                const rSnap = await getDocs(collection(db, "reports")); let reps = [];
                rSnap.forEach(d => { const dt = d.data(); if(!dt.resolved) reps.push({id: d.id, ...dt}); });
                rDiv.innerHTML = reps.length ? reps.map(r => `
                    <div class="spot-card" style="border-left:4px solid var(--accent-red);"><b>対象ID: ${r.spotId}</b><br><small style="color:var(--accent-red);font-weight:bold;">${escapeHTML(r.category)}</small><p style="font-size:0.85rem;margin:4px 0;">${escapeHTML(r.text)}</p>
                    <div style="display:flex;gap:8px;margin-top:8px;"><button class="btn-small" style="background:var(--science-sub);" onclick="resolveReport('${r.id}')">対応済にする</button><button class="btn-small" style="background:var(--accent-red);" onclick="deleteSpot('${r.spotId}')">対象スポット削除</button></div></div>
                `).join('') : "<p>未対応の報告はありません。</p>";
            } catch(e) { uDiv.innerHTML = "エラー"; rDiv.innerHTML = "エラー"; console.error(e); }
        }

        window.approveSpot = async function(id) { if(!confirm("承認しますか？")) return; await updateDoc(doc(db, "spots", id), { approved: true }); alert("承認しました"); loadAdminData(); loadSpots(); }
        window.deleteSpot = async function(id) { if(!confirm("本当に削除しますか？")) return; await deleteDoc(doc(db, "spots", id)); alert("削除しました"); loadAdminData(); loadSpots(); }
        window.resolveReport = async function(id) { await updateDoc(doc(db, "reports", id), { resolved: true }); loadAdminData(); }

        // --- 報告モーダル ---
        window.openReportModal = function() { document.getElementById('report-modal').style.display = 'flex'; }
        window.closeReportModal = function() { document.getElementById('report-modal').style.display = 'none'; document.getElementById('report-text').value = ''; }
        window.submitReport = async function() {
            const cat = document.getElementById('report-category').value; const txt = document.getElementById('report-text').value; const btn = document.getElementById('submit-report-btn');
            if(!txt) { alert("詳細を入力してください。"); return; }
            btn.disabled = true; btn.innerText = "送信中...";
            try { await addDoc(collection(db, "reports"), { spotId: window.currentDetailSpotId, category: cat, text: txt, created_at: serverTimestamp(), resolved: false }); alert("報告を送信しました。ご協力ありがとうございます。"); closeReportModal(); } 
            catch(e) { alert("送信に失敗しました。"); } finally { btn.disabled = false; btn.innerText = "送信"; }
        }

        // --- 初期化 ---
        loadSpots();

        // コメント読み込み・追加、GPS取得、追加フォーム送信処理は文字数制限を回避するため省略なく結合（前バージョンのロジックをそのまま維持しています）
        async function loadComments(spotId) {
            const list = document.getElementById('detail-comments-list'); list.innerHTML = '読込中...';
            try { const qSnap = await getDocs(collection(db, "spots", spotId, "comments")); let cmts = []; qSnap.forEach(d => cmts.push(d.data())); cmts.sort((a, b) => (a.created_at?.toMillis()||0) - (b.created_at?.toMillis()||0));
                list.innerHTML = cmts.length ? cmts.map(c => `<div class="comment-item"><div class="comment-header"><span class="comment-name">${escapeHTML(c.name)||'名無しさん'}</span><span class="comment-date">${new Date(c.created_at?.toMillis()||Date.now()).toLocaleString('ja-JP')}</span></div><div class="comment-text">${escapeHTML(c.text)}</div></div>`).join('') : '<p>まだコメントはありません。</p>';
            } catch { list.innerHTML = '失敗しました'; }
        }
        document.getElementById('add-comment-form').addEventListener('submit', async(e) => { e.preventDefault(); if(!window.currentDetailSpotId) return; const btn = document.getElementById('submit-comment-btn'); btn.disabled=true; btn.innerText="送信中"; try{ await addDoc(collection(db,"spots",window.currentDetailSpotId,"comments"), {name:document.getElementById('comment-name').value, text:document.getElementById('comment-text').value, created_at:serverTimestamp()}); e.target.reset(); await loadComments(window.currentDetailSpotId); btn.innerText="完了"; setTimeout(()=>{btn.disabled=false;btn.innerText="送信する";},2000); }catch(err){alert('失敗');btn.disabled=false;btn.innerText="送信する";} });

        // タブ切り替え
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active')); item.classList.add('active');
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                const tid = item.dataset.target; if (tid !== 'view-detail' && tid !== 'view-admin') previousView = tid;
                document.getElementById(tid).classList.add('active');
                if (tid === 'view-map') requestAnimationFrame(() => map.invalidateSize());
                if (tid === 'view-add') { initAddMap(); setTimeout(() => { if(addMap) addMap.invalidateSize(); }, 100); }
                window.scrollTo(0, 0);
            });
        });
    </script>
</body>
</html>
