<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="pwaicon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1c3177">
    <title>ScienceTokyoWater</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        :root {
            --science-blue: #1c3177; --science-sub: #7f96c2; --bg-color: #f2f4f9;
            --bg-darker: #e8eaf1; --accent-red: #f02b2b; --accent-green: #2b9e4a;
            --card-bg: #FFFFFF; --text-main: #222222; --text-sub: #707070;
            --pin-hot: #f02b2b; --pin-machine: #1c3177; --pin-tap: #00a8ff; --pin-default: #7f96c2;
        }

        body {
            font-family: 'Hind', 'Noto Sans JP', sans-serif; margin: 0; padding: 0;
            background-color: var(--bg-color); color: var(--text-main);
            padding-top: 60px; padding-bottom: calc(70px + env(safe-area-inset-bottom));
            -webkit-font-smoothing: antialiased; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* --- ヘッダー --- */
        header {
            background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            height: 60px; font-size: 1.15rem; font-weight: 700;
            color: var(--science-blue); position: fixed; top: 0; left: 0; right: 0;
            z-index: 2000; box-shadow: 0 1px 0 rgba(28, 49, 119, 0.1); letter-spacing: 0.02em;
        }
        .header-logo { width: 24px; height: 24px; margin-right: 8px; object-fit: contain; border-radius: 4px; }

        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; height: 100%; min-height: calc(100vh - 140px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* --- マップ関連 --- */
        #view-map.active { position: fixed; top: 0; left: 0; right: 0; bottom: 0; padding: 0; z-index: 10; }
        #map { width: 100%; height: 100%; z-index: 1; background-color: #e5e3df; }
        .leaflet-top { top: 65px !important; }
        
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 8px 24px rgba(28,49,119,0.15); }
        .leaflet-popup-content { margin: 14px; font-family: 'Hind', 'Noto Sans JP', sans-serif; width: 220px !important; }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-sub); top: 8px; right: 8px; font-size: 1.2rem; padding: 4px; }
        
        .custom-popup { display: flex; flex-direction: column; gap: 4px; }
        .popup-placename { font-size: 0.75rem; color: var(--science-sub); font-weight: 600; display: flex; gap:4px; align-items: center; line-height: 1.2; }
        .popup-floor { background: var(--bg-color); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; color: var(--science-blue); font-weight: 700; border: 1px solid var(--bg-darker); white-space: nowrap; }
        .popup-title { font-size: 1.05rem; font-weight: 800; color: var(--science-blue); line-height: 1.3; margin-bottom: 2px; }
        .popup-btn { background: var(--bg-color); border: 1px solid var(--bg-darker); color: var(--science-blue); font-weight: 700; padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s ease; font-size: 0.85rem; margin-top: 6px; }
        .popup-btn:active { background: var(--bg-darker); }

        .custom-pin { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); display: flex; align-items: center; justify-content: center; }
        .custom-pin svg { width: 100%; height: 100%; }

        .floating-ui-top { position: absolute; top: 76px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .floating-btn { width: auto; padding: 10px 20px; font-size: 0.85rem; border-radius: 30px; box-shadow: 0 6px 16px rgba(28, 49, 119, 0.25); white-space: nowrap; pointer-events: auto; font-weight: 700; display: flex; align-items: center; gap: 6px; background: var(--science-blue); color: white; border: none; cursor: pointer; transition: background 0.2s ease, transform 0.1s;}
        .floating-btn:active { background: #15265b; }
        
        .floating-ui-bottom { position: absolute; bottom: calc(75px + env(safe-area-inset-bottom)); left: 0; width: 100%; z-index: 1000; pointer-events: none; }

        .horizontal-scroll-list { pointer-events: auto; display: flex; gap: 12px; overflow-x: auto; padding: 10px 16px 20px 16px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .horizontal-scroll-list::-webkit-scrollbar { display: none; }
        #map-visible-list .spot-card { pointer-events: auto; flex: 0 0 85%; scroll-snap-align: center; background-color: rgba(255, 255, 255, 0.98); box-shadow: 0 6px 20px rgba(28, 49, 119, 0.15); border: 1px solid var(--bg-darker); margin-bottom: 0; padding: 14px; border-radius: 16px; max-width: 320px; }
        
        .empty-message-pill { pointer-events: auto; background: rgba(255,255,255,0.98); padding: 12px 24px; border-radius: 30px; margin: 0 auto; font-size: 0.85rem; font-weight: 700; color: var(--text-sub); box-shadow: 0 8px 20px rgba(28, 49, 119, 0.1); border: 1px solid var(--bg-darker); }

        /* --- 共通ボタン --- */
        .btn-large { pointer-events: auto; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--science-blue); color: white; border: none; padding: 14px; font-size: 0.95rem; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: inherit; transition: background 0.2s ease; }
        .btn-large:active { background: #15265b; }
        .btn-large:disabled { background: var(--science-sub); cursor: not-allowed; }
        .btn-secondary { background: var(--bg-color); border: 1px solid var(--bg-darker); color: var(--science-blue); box-shadow: none; }
        .btn-secondary:active { background: var(--bg-darker); }

        .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .control-item { background: white; padding: 10px 16px; border-radius: 30px; font-size: 0.85rem; border: 1px solid var(--science-sub); color: var(--science-blue); cursor: pointer; font-family: inherit; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .control-item.active { background: var(--science-blue); color: white; border-color: var(--science-blue); }

        .section-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 16px 0; color: var(--science-blue); }

        /* --- スポットカード --- */
        .spot-card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(28, 49, 119, 0.06); position: relative; border: 1px solid var(--bg-darker); }
        .clickable-card { cursor: pointer; transition: background-color 0.2s ease; }
        .clickable-card:active { background-color: var(--bg-color); }
        
        .spot-meta { font-size: 0.8rem; color: var(--text-sub); display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .dist-badge { background: var(--bg-darker); padding: 2px 6px; border-radius: 4px; font-weight: 600; color: var(--science-blue); }
        .closed-days { color: var(--accent-red); font-weight: 600; font-size: 0.85em; }
        .status-badge { position: absolute; top: 16px; right: 16px; padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; }
        .status-open { background: #eef7f0; color: var(--accent-green); }
        .status-closed { background: #fdf0f0; color: var(--accent-red); }
        .spot-title { font-size: 1.1rem; font-weight: 800; margin: 4px 0 6px 0; color: var(--text-main); line-height: 1.3; display: flex; align-items: center; gap: 6px; }

        /* --- フォーム --- */
        form label { display: block; margin-top: 20px; margin-bottom: 8px; font-size: 0.85rem; color: var(--science-blue); font-weight: 700; }
        form input[type="text"], form input[type="file"], form textarea { width: 100%; padding: 12px; border: 1px solid var(--science-sub); border-radius: 8px; font-family: inherit; box-sizing: border-box; font-size: 0.95rem; background: white; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        form input:focus, form textarea:focus { outline: none; border-color: var(--science-blue); box-shadow: 0 0 0 3px rgba(28, 49, 119, 0.1); }
        form input:disabled { background-color: var(--bg-darker); color: var(--text-sub); border-color: var(--bg-darker); cursor: not-allowed; }
        .input-group { display: flex; gap: 8px; }

        .feature-badge { display: inline-block; padding: 4px 8px; background: var(--bg-color); color: var(--science-sub); border: 1px solid var(--bg-darker); border-radius: 6px; font-size: 0.75rem; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
        .feature-checkbox { display: none; }
        .feature-label { display: inline-block; padding: 8px 12px; background: var(--bg-color); border: 1px solid var(--bg-darker); border-radius: 8px; font-size: 0.85rem; color: var(--text-sub); cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .feature-checkbox:checked + .feature-label { background: var(--science-blue); color: white; border-color: var(--science-blue); box-shadow: 0 2px 6px rgba(28,49,119,0.2); }
        .features-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

        .days-grid { display: flex; flex-wrap: nowrap; gap: 4px; margin-bottom: 12px; width: 100%; }
        .day-checkbox { display: none; }
        .day-label { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 0; background: var(--bg-color); border: 1px solid var(--bg-darker); border-radius: 6px; font-size: 0.8rem; color: var(--text-sub); cursor: pointer; font-weight: 600; transition: all 0.2s;}
        .day-checkbox:checked + .day-label { background: var(--science-blue); color: white; border-color: var(--science-blue); }

        .add-map-container { position: relative; height: 200px; width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--science-sub); margin-bottom: 8px; background-color: #e5e3df; }
        .center-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 1000; pointer-events: none; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); transition: transform 0.1s; }
        .center-pin.moving { transform: translate(-50%, -120%); }

        /* --- 詳細ページ --- */
        .detail-image { width: 100%; height: 240px; object-fit: cover; border-radius: 12px; margin-bottom: 16px; background-color: var(--bg-color); border: 1px solid var(--bg-darker); }
        .detail-back-btn { background: none; border: none; color: var(--text-sub); font-size: 1.05rem; font-weight: bold; padding: 8px 0; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
        .detail-back-btn:active { color: var(--science-blue); }

        .comment-item { background: var(--bg-color); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--bg-darker); }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .comment-name { font-size: 0.85rem; font-weight: 700; color: var(--science-blue); }
        .comment-date { font-size: 0.7rem; color: var(--text-sub); }
        .comment-text { font-size: 0.9rem; white-space: pre-wrap; color: var(--text-main); line-height: 1.5; }
        #detail-comments-list { margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding-right: 4px; }

        /* --- フッター --- */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.96); 
            backdrop-filter: blur(10px); display: flex; justify-content: space-around; 
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0; 
            box-shadow: 0 -2px 15px rgba(28,49,119,0.08); z-index: 2000; border-top: 1px solid var(--bg-darker);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #99a5c1; width: 33%; cursor: pointer; transition: color 0.2s ease; font-weight: 600; padding: 4px 0;}
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; stroke: currentColor; transition: transform 0.2s ease; }
        .nav-item.active { color: var(--science-blue); }
        .nav-item.active svg { transform: translateY(-2px); stroke-width: 2.5px; }
    </style>
</head>
<body>

    <header>
        <img src="menuicon.png" alt="Logo" class="header-logo">
        ScienceTokyoWater
    </header>

    <div id="view-map" class="view-section active">
        <div id="map"></div>
        <div class="floating-ui-top">
            <button id="gps-btn" class="floating-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                現在地周辺を検索
            </button>
        </div>
        <div class="floating-ui-bottom"><div id="map-visible-list" class="horizontal-scroll-list"></div></div>
    </div>

    <div class="container view-section" id="view-list">
        <h2 class="section-title">スポット一覧</h2>
        <div class="controls">
            <select id="sort-select" class="control-item" style="appearance: none; padding-right: 24px; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%231c3177%22 viewBox=%220 0 24 24%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 8px center; background-size: 16px;">
                <option value="default">名前順</option>
                <option value="distance">現在地に近い順</option>
            </select>
            <div id="filter-open" class="control-item"><span class="status-dot" style="display:inline-block; width:8px; height:8px; background:var(--accent-green); border-radius:50%; margin-right:6px;"></span>営業中のみ</div>
        </div>
        <div id="full-spot-list"><p style="text-align: center; color: var(--text-sub); font-size: 0.9rem; padding: 20px;">読み込み中...</p></div>
    </div>

    <div class="container view-section" id="view-add">
        <h2 class="section-title">新規スポットの追加</h2>
        <p style="font-size: 0.85rem; color: var(--text-sub); margin-bottom: 20px; line-height: 1.5;">
            見つけた給水スポットを登録して共有しましょう。<br>
            <span style="color:var(--accent-red); font-weight:600;">※管理者の承認後にマップに表示されます。</span>
        </p>
        
        <div class="spot-card" style="padding: 20px;">
            <form id="add-spot-form">
                <label>スポット名 (必須)</label>
                <input type="text" id="add-name" required placeholder="例: 西3号館 ウォーターサーバー">

                <label>建物名・エリア と 階数 (必須)</label>
                <div class="input-group">
                    <input type="text" id="add-placename" required placeholder="建物名 (例: 本館)" style="flex: 2;">
                    <input type="text" id="add-floor" placeholder="階数 (例: 3階)" style="flex: 1;">
                </div>

                <label>場所の指定 (地図を動かしてピンを合わせる)</label>
                <div class="add-map-container">
                    <div id="add-map" style="width: 100%; height: 100%; z-index: 1;"></div>
                    <div id="center-pin" class="center-pin">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--accent-red)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>
                    </div>
                </div>
                <input type="hidden" id="add-lat">
                <input type="hidden" id="add-lng">
                <button type="button" id="btn-get-location" class="btn-large btn-secondary" style="margin-top:12px; padding: 10px; font-size: 0.9rem; border-radius: 8px;">📍 現在地を取得</button>

                <label>特徴 (複数選択可)</label>
                <div class="features-grid">
                    <input type="checkbox" id="f1" name="features" value="給水機" class="feature-checkbox"><label for="f1" class="feature-label">給水機</label>
                    <input type="checkbox" id="f2" name="features" value="蛇口" class="feature-checkbox"><label for="f2" class="feature-label">蛇口</label>
                    <input type="checkbox" id="f3" name="features" value="お湯" class="feature-checkbox"><label for="f3" class="feature-label">お湯</label>
                </div>

                <label>利用可能時間 (必須)</label>
                <div class="input-group" style="margin-bottom:12px;">
                    <input type="text" id="add-hours" placeholder="例: 09:00 - 18:00" style="flex:1;">
                    <button type="button" id="btn-24h" class="control-item" style="margin:0; border-radius:8px; border: 1px solid var(--science-sub);">24時間営業</button>
                </div>

                <label>休業日</label>
                <div class="days-grid">
                    <input type="checkbox" id="d1" name="closed_days" value="1" class="day-checkbox"><label for="d1" class="day-label">月</label>
                    <input type="checkbox" id="d2" name="closed_days" value="2" class="day-checkbox"><label for="d2" class="day-label">火</label>
                    <input type="checkbox" id="d3" name="closed_days" value="3" class="day-checkbox"><label for="d3" class="day-label">水</label>
                    <input type="checkbox" id="d4" name="closed_days" value="4" class="day-checkbox"><label for="d4" class="day-label">木</label>
                    <input type="checkbox" id="d5" name="closed_days" value="5" class="day-checkbox"><label for="d5" class="day-label">金</label>
                    <input type="checkbox" id="d6" name="closed_days" value="6" class="day-checkbox"><label for="d6" class="day-label">土</label>
                    <input type="checkbox" id="d0" name="closed_days" value="0" class="day-checkbox"><label for="d0" class="day-label">日</label>
                    <input type="checkbox" id="d7" name="closed_days" value="7" class="day-checkbox"><label for="d7" class="day-label">祝</label>
                </div>

                <label>画像 (自動圧縮されます / 任意)</label>
                <input type="file" id="add-image" accept="image/*" style="padding: 8px;">

                <button type="submit" id="submit-btn" class="btn-large" style="margin-top:24px;">この内容で申請する</button>
            </form>
        </div>
    </div>

    <div id="view-detail" class="view-section">
        <div class="container">
            <button class="detail-back-btn" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> 戻る
            </button>
            <div class="spot-card" style="cursor: default; padding: 20px; margin-bottom: 30px;">
                <img id="detail-image" class="detail-image" src="" alt="スポット画像" style="display:none;">
                <div id="detail-placename" class="spot-placename" style="font-size: 0.9rem; display:flex; gap:6px; align-items:center;"></div>
                <h2 id="detail-title" class="spot-title" style="font-size: 1.5rem; margin: 8px 0;"></h2>
                <div id="detail-features" style="margin-bottom: 16px;"></div>
                <div id="detail-meta" class="spot-meta" style="font-size: 1rem; margin-bottom: 16px; font-weight: 500;"></div>
                
                <button class="btn-large btn-secondary" onclick="flyToSpotFromDetail()">地図で確認する</button>
                
                <div id="detail-comments-section" style="margin-top: 30px; border-top: 1px solid var(--bg-darker); padding-top: 20px;">
                    <h3 class="section-title" style="font-size: 1.1rem; margin-bottom: 16px;">コメント</h3>
                    <div id="detail-comments-list"></div>
                    <form id="add-comment-form" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                        <input type="text" id="comment-name" placeholder="お名前 (省略可)">
                        <textarea id="comment-text" required placeholder="コメントを入力..." style="resize: vertical; min-height: 80px;"></textarea>
                        <button type="submit" id="submit-comment-btn" class="btn-large" style="padding: 12px; font-size: 0.95rem;">送信する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-target="view-map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
            <span>マップ</span>
        </div>
        <div class="nav-item" data-target="view-list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            <span>リスト</span>
        </div>
        <div class="nav-item" data-target="view-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span>追加</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        // ★ Carto V2のマップデザイン（日本語ラベル適用）に差し替え
        const MAP_TILE_URL = 'https://tile.tracestrack.com/ja/{z}/{x}/{y}.png?key=27e171dc5ca2cc214ecf5ab9d0f493bd';
        const MAP_ATTRIBUTION = '&copy; OpenStreetMap contributors, Tiles &copy; Tracestrack';
        
        const map = L.map('map', { zoomControl: false }).setView([35.6061, 139.6833], 16);
        L.tileLayer(MAP_TILE_URL, { maxZoom: 19, attribution: MAP_ATTRIBUTION }).addTo(map);

        let addMap = null;
        function initAddMap() {
            if (addMap) return;
            addMap = L.map('add-map', { zoomControl: false }).setView([35.6061, 139.6833], 16);
            L.tileLayer(MAP_TILE_URL, { maxZoom: 19 }).addTo(addMap);
            
            const pinEl = document.getElementById('center-pin');
            addMap.currentLat = 35.606100;
            addMap.currentLng = 139.683300;
            
            addMap.on('movestart', () => pinEl.classList.add('moving'));
            addMap.on('move', () => { 
                const center = addMap.getCenter(); 
                addMap.currentLat = center.lat; 
                addMap.currentLng = center.lng; 
            });
            addMap.on('moveend', () => pinEl.classList.remove('moving'));
        }
        
        setTimeout(() => { map.invalidateSize(); }, 500);
    </script>

    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }</script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8mhgrQnPLqpXJI9Fq6_PvzxKBVUViLLg",
            authDomain: "sciencetokyowater.firebaseapp.com",
            projectId: "sciencetokyowater",
            storageBucket: "sciencetokyowater.firebasestorage.app",
            messagingSenderId: "1039095456448",
            appId: "1:1039095456448:web:548ed9fcc01c811b470325"
        };
        
        const app = initializeApp(firebaseConfig);
        let db;
        
        try {
            db = initializeFirestore(app, {
                localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
            });
        } catch (e) {
            console.warn("ローカルキャッシュが無効です。標準モードで起動します。");
            db = getFirestore(app);
        }
        const storage = getStorage(app);

        let allSpots = []; let userLocation = null; let userMarker = null;
        let filterOpenOnly = false; let previousView = 'view-map'; let currentDetailSpotId = null;
        let isFormDirty = false;
        
        window.onbeforeunload = () => isFormDirty ? "入力内容が破棄されますがよろしいですか？" : null;
        document.getElementById('add-spot-form').addEventListener('input', () => isFormDirty = true);

        let is24h = false;
        document.getElementById('btn-24h').addEventListener('click', (e) => {
            is24h = !is24h; const input = document.getElementById('add-hours');
            if (is24h) {
                e.target.classList.add('active'); input.value = ''; input.disabled = true; input.placeholder = "24時間営業";
            } else {
                e.target.classList.remove('active'); input.disabled = false; input.placeholder = "例: 09:00 - 18:00";
            }
        });

        function escapeHTML(str) {
            if (typeof str !== 'string') return '';
            return str.replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match]));
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDistance(meters) { return meters < 1000 ? `${Math.round(meters)}m` : `${(meters / 1000).toFixed(1)}km`; }

        function isOpen(spot) {
            const hoursStr = spot.available_hours || "24時間営業";
            const currentDay = new Date().getDay(); 
            if ((spot.closed_days || []).includes(currentDay)) return false;
            if (hoursStr.includes("24時間") || hoursStr === "不明") return true;
            try {
                const ct = new Date().getHours() * 60 + new Date().getMinutes();
                const parts = hoursStr.split('-');
                if(parts.length !== 2) return true;
                const startParts = parts[0].trim().split(':').map(Number);
                const endParts = parts[1].trim().split(':').map(Number);
                if(startParts.length !== 2 || endParts.length !== 2) return true;
                const start = startParts[0] * 60 + startParts[1];
                const end = endParts[0] * 60 + endParts[1];
                return ct >= start && ct <= end;
            } catch { return true; }
        }

        function getClosedDaysText(closed) {
            if (!closed || closed.length === 0) return "";
            const dayNames = ["日", "月", "火", "水", "木", "金", "土", "祝"];
            return `<span class="closed-days">休: ${closed.map(d => dayNames[d]).join(',')}</span>`;
        }

        function getPinColor(features) {
            if (!features || !Array.isArray(features)) return "var(--pin-default)";
            if (features.includes("お湯")) return "var(--pin-hot)";
            if (features.includes("給水機")) return "var(--pin-machine)";
            if (features.includes("蛇口")) return "var(--pin-tap)";
            return "var(--pin-default)"; 
        }

        function createCustomIcon(color) {
            const svg = `<svg viewBox="0 0 24 24" fill="${color}" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="white"></circle></svg>`;
            return L.divIcon({ className: 'custom-pin', html: svg, iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -32] });
        }

        async function compressImage(file, maxSize = 1200) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; }
                        } else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.8);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function loadComments(spotId) {
            const commentsListEl = document.getElementById('detail-comments-list');
            commentsListEl.innerHTML = '<p style="font-size:0.85rem; color:var(--text-sub);">読み込み中...</p>';
            try {
                const qSnap = await getDocs(collection(db, "spots", spotId, "comments"));
                let comments = [];
                qSnap.forEach(doc => comments.push(doc.data()));
                
                comments.sort((a, b) => {
                    const timeA = a.created_at ? a.created_at.toMillis() : 0;
                    const timeB = b.created_at ? b.created_at.toMillis() : 0;
                    return timeA - timeB;
                });

                if (comments.length === 0) {
                    commentsListEl.innerHTML = '<p style="font-size:0.85rem; color:var(--text-sub);">まだコメントはありません。最初のコメントを書き込もう！</p>';
                    return;
                }

                commentsListEl.innerHTML = comments.map(c => {
                    const dateObj = c.created_at ? new Date(c.created_at.toMillis()) : new Date();
                    const dateStr = dateObj.toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
                    return `
                        <div class="comment-item">
                            <div class="comment-header">
                                <span class="comment-name">${escapeHTML(c.name) || '名無しさん'}</span>
                                <span class="comment-date">${dateStr}</span>
                            </div>
                            <div class="comment-text">${escapeHTML(c.text)}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("コメント読み込みエラー:", err);
                commentsListEl.innerHTML = '<p style="font-size:0.85rem; color:var(--accent-red);">コメントの取得に失敗しました。</p>';
            }
        }

        window.flyToSpot = function(id) {
            const spot = allSpots.find(s => s.id === id);
            if (!spot) return;
            document.querySelector('[data-target="view-map"]').click();
            map.flyTo([spot.latitude, spot.longitude], 18, { animate: true, duration: 1.5 });
            setTimeout(() => { if (spot.marker) spot.marker.openPopup(); }, 1600);
        }

        window.showDetail = function(id) {
            const activeView = document.querySelector('.view-section.active');
            if (activeView && activeView.id !== 'view-detail') { previousView = activeView.id; }

            currentDetailSpotId = id;
            const spot = allSpots.find(s => s.id === id);
            if (!spot) return;
            
            document.getElementById('detail-title').innerText = spot.name;
            
            let placeHtml = `<span>${escapeHTML(spot.placename) || "場所未設定"}</span>`;
            if (spot.floor) { placeHtml += `<span class="popup-floor">${escapeHTML(spot.floor)}</span>`; }
            document.getElementById('detail-placename').innerHTML = placeHtml;
            
            const hoursStr = escapeHTML(spot.available_hours) || "24時間営業";
            const closedStr = getClosedDaysText(spot.closed_days);
            document.getElementById('detail-meta').innerHTML = `<span>${hoursStr}</span>${closedStr}`;
            
            const imgEl = document.getElementById('detail-image');
            if (spot.imageUrl) { imgEl.src = spot.imageUrl; imgEl.style.display = 'block'; }
            else { imgEl.style.display = 'none'; }
            
            const featuresEl = document.getElementById('detail-features');
            featuresEl.innerHTML = (Array.isArray(spot.features) ? spot.features : []).map(f => `<span class="feature-badge">${escapeHTML(f)}</span>`).join('');
            
            loadComments(id);
            
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-detail').classList.add('active');
            window.scrollTo(0, 0);
        }

        window.goBack = function() { document.querySelector(`[data-target="${previousView}"]`).click(); }
        window.flyToSpotFromDetail = function() { if (currentDetailSpotId) flyToSpot(currentDetailSpotId); }

        function createCard(spot, onClickAction) {
            const openStatus = isOpen(spot);
            const distText = spot.distance ? `<span class="dist-badge">${formatDistance(spot.distance)}</span>` : "";
            const closedText = getClosedDaysText(spot.closed_days);
            const featuresHtml = (Array.isArray(spot.features) ? spot.features : []).map(f => `<span class="feature-badge">${escapeHTML(f)}</span>`).join('');
            const imgIcon = spot.imageUrl ? `<svg style="width:14px;height:14px;color:var(--science-sub);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>` : '';
            const safeHours = escapeHTML(spot.available_hours) || "24時間営業";
            const floorBadge = spot.floor ? `<span class="popup-floor">${escapeHTML(spot.floor)}</span>` : "";

            return `
                <div class="spot-card clickable-card" onclick="${onClickAction}('${spot.id}')">
                    <span class="status-badge ${openStatus ? 'status-open' : 'status-closed'}">${openStatus ? '営業中' : '時間外'}</span>
                    <div class="popup-placename" style="margin-bottom:6px;"><span>${escapeHTML(spot.placename) || "場所未設定"}</span> ${floorBadge}</div>
                    <div class="spot-title"><b>${escapeHTML(spot.name)}</b> ${imgIcon}</div>
                    <div style="margin-bottom: 8px; margin-top: 6px;">${featuresHtml}</div>
                    <div class="spot-meta">${distText}<span>${safeHours}</span>${closedText}</div>
                </div>
            `;
        }

        function updateMapVisibleList() {
            const container = document.getElementById("map-visible-list");
            const bounds = map.getBounds();
            const visibleSpots = allSpots.filter(s => bounds.contains(L.latLng(s.latitude, s.longitude)));
            container.innerHTML = visibleSpots.length > 0 ? visibleSpots.map(s => createCard(s, 'flyToSpot')).join('') : `<div class="empty-message-pill">このエリアに見つかりませんでした</div>`;
        }

        function updateFullList() {
            const container = document.getElementById("full-spot-list");
            const sortBy = document.getElementById("sort-select").value;
            let displaySpots = [...allSpots];
            
            if (userLocation) { displaySpots.forEach(s => { s.distance = getDistance(userLocation[0], userLocation[1], s.latitude, s.longitude); }); }
            if (filterOpenOnly) displaySpots = displaySpots.filter(s => isOpen(s));
            
            if (sortBy === "distance" && userLocation) { 
                displaySpots.sort((a, b) => a.distance - b.distance); 
            } else { 
                displaySpots.sort((a, b) => a.name.localeCompare(b.name, 'ja')); 
            }
            
            container.innerHTML = displaySpots.map(s => createCard(s, 'showDetail')).join('') || "<p style='text-align:center; padding: 40px 20px; color:var(--text-sub);'>条件に合うスポットがありません</p>";

            allSpots.forEach(spot => {
                const isVisible = filterOpenOnly ? isOpen(spot) : true;
                if (isVisible) {
                    if (!map.hasLayer(spot.marker)) spot.marker.addTo(map);
                } else {
                    if (map.hasLayer(spot.marker)) map.removeLayer(spot.marker);
                }
            });
        }

        function addMarker(spot) {
            const safeName = escapeHTML(spot.name);
            const safeHours = escapeHTML(spot.available_hours) || "24時間営業";
            const floorBadge = spot.floor ? `<span class="popup-floor">${escapeHTML(spot.floor)}</span>` : "";
            
            const popupHtml = `
                <div class="custom-popup">
                    <div class="popup-placename"><span>${escapeHTML(spot.placename) || "場所未設定"}</span>${floorBadge}</div>
                    <div class="popup-title">${safeName}</div>
                    <div class="spot-meta" style="margin-bottom:8px;"><span>${safeHours}</span>${getClosedDaysText(spot.closed_days)}</div>
                    <button class="popup-btn" onclick="showDetail('${spot.id}')">詳細を見る</button>
                </div>
            `;
            const pinColor = getPinColor(spot.features);
            const marker = L.marker([spot.latitude, spot.longitude], { icon: createCustomIcon(pinColor) }).addTo(map);
            
            marker.bindPopup(popupHtml);
            spot.marker = marker;
            allSpots.push(spot);
        }

        async function loadSpots() {
            try {
                const querySnapshot = await getDocs(collection(db, "spots"));
                allSpots = []; 
                querySnapshot.forEach(doc => {
                    const spot = doc.data();
                    spot.id = doc.id; 
                    if (spot.latitude && spot.longitude && spot.approved !== false) { 
                        addMarker(spot); 
                    }
                });
                updateMapVisibleList();
                updateFullList();
            } catch (error) { 
                console.error("データ読み込み失敗:", error); 
                document.getElementById("full-spot-list").innerHTML = `<p style="text-align: center; color: var(--accent-red); font-size: 0.9rem; padding: 20px;">データの読み込みに失敗しました。</p>`;
            }
        }

        map.on('moveend', updateMapVisibleList);
        
        document.getElementById("sort-select").addEventListener('change', async (e) => {
            if (e.target.value === "distance" && !userLocation) {
                const wantGps = confirm("距離順で並び替えるには、現在地の取得が必要です。現在地を取得しますか？");
                if (wantGps) { document.getElementById('gps-btn').click(); } 
                else { e.target.value = "default"; }
            } else { updateFullList(); }
        });

        document.getElementById("filter-open").addEventListener('click', (e) => { 
            filterOpenOnly = !filterOpenOnly; 
            e.currentTarget.classList.toggle('active'); 
            updateFullList(); 
        });
        
        // ★ 位置情報取得の抜本的改修（高精度タイムアウト時のフォールバック処理）
        function getGPS() { 
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    return reject(new Error("お使いの端末は位置情報に対応していません。"));
                }
                const optionsHigh = { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 };
                
                // まず高精度で取得を試みる
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(pos), 
                    (err) => {
                        console.warn("高精度GPSの取得に失敗。標準精度で再試行します:", err);
                        // 失敗時、より寛容な設定で再チャレンジ
                        navigator.geolocation.getCurrentPosition(
                            (pos) => resolve(pos), 
                            (err2) => reject(err2), 
                            { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 }
                        );
                    }, 
                    optionsHigh
                );
            }); 
        }

        document.getElementById('gps-btn').addEventListener('click', async () => {
            const btn = document.getElementById('gps-btn'); 
            const originalHTML = btn.innerHTML;
            btn.innerHTML = "測位中..."; btn.disabled = true;

            try {
                const pos = await getGPS(); 
                userLocation = [pos.coords.latitude, pos.coords.longitude]; 
                
                if (userMarker) { map.removeLayer(userMarker); }
                const userIcon = L.divIcon({ className: '', html: '<div class="user-location-marker"></div>' });
                userMarker = L.marker(userLocation, {icon: userIcon}).addTo(map);
                
                let nearest = null; let minD = Infinity;
                allSpots.forEach(s => { const d = getDistance(userLocation[0], userLocation[1], s.latitude, s.longitude); if (d < minD) { minD = d; nearest = s; }});
                
                if (nearest) { 
                    map.flyTo([nearest.latitude, nearest.longitude], 18, { animate: true, duration: 1.5 }); 
                    setTimeout(() => { if (nearest.marker) nearest.marker.openPopup(); }, 1600); 
                } else { 
                    map.flyTo(userLocation, 17, { animate: true, duration: 1.5 }); 
                }
                
                updateFullList();
                const sortSelect = document.getElementById("sort-select"); 
                if(sortSelect.value === "default") { sortSelect.value = "distance"; updateFullList(); }
            } catch(err) { 
                console.error(err);
                alert("位置情報を取得できませんでした。端末の設定で位置情報へのアクセスが許可されているかご確認ください。"); 
            } finally {
                btn.innerHTML = originalHTML; btn.disabled = false;
            }
        });

        document.getElementById('btn-get-location').addEventListener('click', async () => {
            const btn = document.getElementById('btn-get-location'); const originalText = btn.innerHTML;
            btn.innerHTML = "📍 取得中..."; btn.disabled = true;
            try { 
                const pos = await getGPS(); 
                if (addMap) { addMap.flyTo([pos.coords.latitude, pos.coords.longitude], 18, { animate: true }); } 
                btn.innerHTML = "📍 取得完了"; 
            } catch(err) { 
                alert("位置情報を取得できませんでした。"); 
            } finally {
                setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 2000); 
            }
        });

        const scrollList = document.getElementById("map-visible-list");
        scrollList.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); scrollList.scrollBy({ left: e.deltaY < 0 ? -150 : 150, behavior: 'smooth' }); }
        });

        document.getElementById('add-spot-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const submitBtn = document.getElementById('submit-btn');

            let finalHours = is24h ? "24時間営業" : document.getElementById('add-hours').value.trim();
            if (!finalHours) { alert("利用可能時間を入力するか、「24時間営業」を選択してください。"); return; }
            
            const latVal = addMap ? addMap.currentLat : null;
            const lngVal = addMap ? addMap.currentLng : null;
            
            if (!latVal || !lngVal) { alert("地図の読み込みが完了していません。少し待ってから再度お試しください。"); return; }

            submitBtn.disabled = true; submitBtn.innerText = "処理中...";
            
            let uploadedImageUrl = "";
            const fileInput = document.getElementById('add-image');
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    alert("画像サイズが大きすぎます。5MB以下の画像を選択してください。");
                    submitBtn.disabled = false; submitBtn.innerText = "この内容で申請する";
                    return; 
                }
                try {
                    submitBtn.innerText = "画像圧縮中...";
                    const compressedBlob = await compressImage(file, 1200); 
                    const storageRef = ref(storage, 'spots/' + Date.now() + '.jpg');
                    await uploadBytes(storageRef, compressedBlob);
                    uploadedImageUrl = await getDownloadURL(storageRef);
                } catch (err) {
                    console.error("画像処理失敗:", err); alert("画像のアップロードに失敗しました。画像なしで登録を続行します。");
                }
            }
            
            submitBtn.innerText = "データ送信中...";
            const closedDaysArray = Array.from(document.querySelectorAll('input[name="closed_days"]:checked')).map(cb => parseInt(cb.value));
            const featuresArray = Array.from(document.querySelectorAll('input[name="features"]:checked')).map(cb => cb.value);

            const newSpot = { 
                name: document.getElementById('add-name').value, 
                placename: document.getElementById('add-placename').value, 
                floor: document.getElementById('add-floor').value || "", 
                latitude: parseFloat(latVal), 
                longitude: parseFloat(lngVal), 
                available_hours: finalHours, 
                closed_days: closedDaysArray,
                features: featuresArray,
                imageUrl: uploadedImageUrl || null,
                approved: false, 
                created_at: serverTimestamp()
            };

            try { 
                await addDoc(collection(db, "spots"), newSpot);
                isFormDirty = false;
                alert("登録申請を受け付けました！管理者の承認後にマップに反映されます。");
                e.target.reset(); 
                
                is24h = false; document.getElementById('btn-24h').classList.remove('active');
                document.getElementById('add-hours').disabled = false; document.getElementById('add-hours').placeholder = "例: 09:00 - 18:00";
                
                document.querySelector('[data-target="view-map"]').click();
            } catch (error) { 
                console.error("エラー:", error); alert("登録に失敗しました。通信環境を確認してください。"); 
            } finally {
                submitBtn.disabled = false; submitBtn.innerText = "この内容で申請する"; 
            }
        });

        document.getElementById('add-comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentDetailSpotId) return;

            const btn = document.getElementById('submit-comment-btn');
            btn.disabled = true; btn.innerText = "送信中...";

            const name = document.getElementById('comment-name').value;
            const text = document.getElementById('comment-text').value;

            try {
                await addDoc(collection(db, "spots", currentDetailSpotId, "comments"), { name: name, text: text, created_at: serverTimestamp() });
                e.target.reset(); await loadComments(currentDetailSpotId);
                btn.innerText = "送信完了"; setTimeout(() => { btn.disabled = false; btn.innerText = "送信する"; }, 3000);
            } catch (err) {
                console.error("コメント送信エラー:", err); alert('コメントの送信に失敗しました。');
                btn.disabled = false; btn.innerText = "送信する";
            }
        });

        // --- タブ切り替え（★ 追加マップの再描画処理を追加） ---
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active')); item.classList.add('active');
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                
                const targetId = item.dataset.target;
                if (targetId !== 'view-detail') { previousView = targetId; }
                document.getElementById(targetId).classList.add('active');
                
                // マップの描画サイズ更新（表示バグ対策）
                if (targetId === 'view-map') {
                    requestAnimationFrame(() => { map.invalidateSize(); });
                }
                // ★ 追加タブ表示時にマップを初期化し、サイズを強制再計算
                if (targetId === 'view-add') { 
                    initAddMap();
                    setTimeout(() => { if (addMap) addMap.invalidateSize(); }, 100);
                }
                window.scrollTo(0, 0);
            });
        });

        // アプリ起動
        loadSpots();
    </script>
</body>
</html>
