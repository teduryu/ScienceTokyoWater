<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード - ScienceTokyoWater</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF; --bg-base: #F2F4F7; --surface: #FFFFFF;
            --text-main: #1C1C1E; --text-sub: #8E8E93; --danger: #FF3B30;
            --border: #E5E5EA;
        }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-base); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .spot-item { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
        .spot-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .spot-img { max-width: 200px; border-radius: 8px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="flex-between">
            <h1>管理者ダッシュボード</h1>
            <button id="logout-btn" class="btn btn-danger" style="display: none;">ログアウト</button>
        </div>

        <div id="auth-section" class="card" style="text-align: center;">
            <p>管理操作を行うには、許可されたGoogleアカウントでログインしてください。</p>
            <button id="login-btn" class="btn">Googleでログイン</button>
            <p id="auth-error" style="color: var(--danger); display: none; margin-top: 10px;"></p>
        </div>

        <div id="admin-dashboard" style="display: none;">
            <p style="color: var(--text-sub);">ログイン中: <strong id="admin-email-disp"></strong></p>
            
            <div class="card">
                <h2>承認待ちのスポット</h2>
                <div id="unapproved-list">読み込み中...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8mhgrQnPLqpXJI9Fq6_PvzxKBVUViLLg", authDomain: "sciencetokyowater.firebaseapp.com",
            projectId: "sciencetokyowater", storageBucket: "sciencetokyowater.firebasestorage.app",
            messagingSenderId: "1039095456448", appId: "1:1039095456448:web:548ed9fcc01c811b470325"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // ★ 管理用メールアドレスを設定
        const ADMIN_EMAILS = ['teduryu@gmail.com'];

        // 認証状態の監視
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (ADMIN_EMAILS.includes(user.email)) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('admin-dashboard').style.display = 'block';
                    document.getElementById('logout-btn').style.display = 'block';
                    document.getElementById('admin-email-disp').innerText = user.email;
                    loadAdminData();
                } else {
                    document.getElementById('auth-error').style.display = 'block';
                    document.getElementById('auth-error').innerText = `エラー: アカウント (${user.email}) には管理者権限がありません。`;
                }
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('admin-dashboard').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
            }
        });

        // ログイン・ログアウト処理
        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, googleProvider));
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // データ読み込み処理
        async function loadAdminData() {
            const list = document.getElementById('unapproved-list');
            list.innerHTML = '<p>読み込み中...</p>';
            try {
                const q = query(collection(db, "spots"), where("approved", "==", false));
                const snap = await getDocs(q);
                let html = '';
                snap.forEach(doc => {
                    const s = doc.data();
                    html += `
                        <div class="spot-item">
                            <h3>${s.name}</h3>
                            <p><strong>場所:</strong> ${s.placename} ${s.floor ? `(${s.floor})` : ''}</p>
                            <p><strong>特徴:</strong> ${(s.features || []).join(', ')}</p>
                            ${s.imageUrl ? `<img src="${s.imageUrl}" class="spot-img">` : ''}
                            <div style="margin-top: 10px;">
                                <button class="btn" onclick="approveSpot('${doc.id}')">承認して公開</button>
                                <button class="btn btn-danger" onclick="deleteSpot('${doc.id}')">削除</button>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html || '<p>現在、承認待ちのスポットはありません。</p>';
            } catch (e) {
                list.innerHTML = `<p style="color:red;">読み込みエラー: ${e.message}</p>`;
            }
        }

        // 承認と削除をグローバル関数にする
        window.approveSpot = async function(id) {
            if(!confirm("承認して一般公開しますか？")) return;
            await updateDoc(doc(db, "spots", id), { approved: true });
            alert("承認しました"); loadAdminData();
        };
        window.deleteSpot = async function(id) {
            if(!confirm("本当に削除しますか？")) return;
            await deleteDoc(doc(db, "spots", id));
            alert("削除しました"); loadAdminData();
        };
    </script>
</body>
</html>
