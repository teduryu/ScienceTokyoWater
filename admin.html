<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード - ScienceTokyoWater</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF; --bg-base: #F2F4F7; --surface: #FFFFFF;
            --text-main: #1C1C1E; --text-sub: #8E8E93; --danger: #FF3B30;
            --success: #34C759; --border: #E5E5EA;
        }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-base); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        h2 { border-bottom: 2px solid var(--primary-light); padding-bottom: 8px; margin-bottom: 16px; }
        .btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem;}
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .btn-success { background: white; color: var(--success); border: 1px solid var(--success); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .item-row { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
        .item-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .item-meta { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 4px; }
        .item-content { font-size: 1rem; margin-bottom: 12px; white-space: pre-wrap; background: var(--bg-base); padding: 12px; border-radius: 8px;}
        .spot-img { max-width: 200px; border-radius: 8px; margin-top: 8px; display: block;}
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; background: var(--border); margin-right: 8px; }
        .badge-warning { background: #FFF500; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <div class="flex-between" style="margin-bottom: 20px;">
            <h1>管理者ダッシュボード</h1>
            <button id="logout-btn" class="btn btn-danger" style="display: none;">ログアウト</button>
        </div>

        <div id="auth-section" class="card" style="text-align: center;">
            <p>管理操作を行うには、許可されたGoogleアカウントでログインしてください。</p>
            <button id="login-btn" class="btn" style="padding: 12px 24px; font-size: 1rem;">Googleでログイン</button>
            <p id="auth-error" style="color: var(--danger); display: none; margin-top: 10px;"></p>
        </div>

        <div id="admin-dashboard" style="display: none;">
            <p style="color: var(--text-sub); margin-bottom: 24px;">ログイン中: <strong id="admin-email-disp"></strong></p>
            
            <div class="card">
                <h2>1. 承認待ちのスポット</h2>
                <div id="unapproved-list">読み込み中...</div>
            </div>

            <div class="card">
                <h2>2. 問題の報告 (未解決)</h2>
                <div id="reports-list">読み込み中...</div>
            </div>

            <div class="card">
                <h2>3. 最新のコメント管理</h2>
                <div id="comments-list">読み込み中...</div>
            </div>
        </div>
    </div>

    <template id="tmpl-unapproved">
        <div class="item-row">
            <h3 class="spot-name" style="margin-bottom: 4px;"></h3>
            <div class="item-meta spot-meta-1"></div>
            <div class="item-meta spot-meta-2"></div>
            <div class="spot-img-container"></div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button class="btn btn-approve">承認して公開</button>
                <button class="btn btn-danger btn-delete">削除 (却下)</button>
            </div>
        </div>
    </template>

    <template id="tmpl-report">
        <div class="item-row">
            <div class="item-meta">
                <span class="badge badge-warning report-category"></span>
                対象: <strong class="report-spot-name"></strong> <span class="report-spot-id"></span> | 報告日時: <span class="report-date"></span>
            </div>
            <div class="item-content report-text"></div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-success btn-resolve">解決済みにする</button>
                <button class="btn btn-danger btn-delete-report">この報告を削除</button>
            </div>
        </div>
    </template>

    <template id="tmpl-comment">
        <div class="item-row">
            <div class="item-meta">
                スポット: <strong class="comment-spot-name"></strong> | 
                投稿者: <span class="comment-author"></span> | 
                日時: <span class="comment-date"></span>
            </div>
            <div class="item-content comment-text"></div>
            <div>
                <button class="btn btn-danger btn-delete-comment">このコメントを削除</button>
            </div>
        </div>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getFirestore, collection, getDocs, getDoc, doc, updateDoc, deleteDoc, 
            query, where, collectionGroup, orderBy, limit 
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getStorage, ref as storageRef, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        // ===== 初期設定 =====
        const firebaseConfig = {
            apiKey: "AIzaSyD8mhgrQnPLqpXJI9Fq6_PvzxKBVUViLLg", authDomain: "sciencetokyowater.firebaseapp.com",
            projectId: "sciencetokyowater", storageBucket: "sciencetokyowater.firebasestorage.app",
            messagingSenderId: "1039095456448", appId: "1:1039095456448:web:548ed9fcc01c811b470325"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const googleProvider = new GoogleAuthProvider();
        const ADMIN_EMAILS = ['teduryu@gmail.com'];

        // ===== ユーティリティ関数 =====
        function formatDate(timestamp) {
            if (!timestamp) return '日時不明';
            return new Date(timestamp.toMillis()).toLocaleString('ja-JP');
        }

        // --- 全件キャッシュの廃止とオンデマンド取得 ---
        const spotsCache = {};
        
        async function getSpotName(spotId) {
            if (spotsCache[spotId]) return spotsCache[spotId];
            
            try {
                const spotDoc = await getDoc(doc(db, "spots", spotId));
                if (spotDoc.exists()) {
                    const name = spotDoc.data().name;
                    spotsCache[spotId] = name;
                    return name;
                }
            } catch (e) {
                console.warn(`スポット名取得エラー (ID: ${spotId})`, e);
            }
            
            spotsCache[spotId] = "不明/削除されたスポット";
            return spotsCache[spotId];
        }

        // ===== 認証状態の監視 =====
        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('admin-email-disp').innerText = user.email;
                renderAllData();
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('admin-dashboard').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
                if (user) {
                    const errorEl = document.getElementById('auth-error');
                    errorEl.style.display = 'block';
                    errorEl.innerText = `エラー: アカウント (${user.email}) には管理者権限がありません。`;
                }
            }
        });

        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, googleProvider));
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        function renderAllData() {
            renderUnapprovedSpots();
            renderReports();
            renderComments();
        }

        // ===== 1. 承認待ちスポット =====
        async function renderUnapprovedSpots() {
            const listContainer = document.getElementById('unapproved-list');
            listContainer.innerHTML = '';
            
            try {
                const q = query(collection(db, "spots"), where("approved", "==", false));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    listContainer.innerHTML = '<p>現在、承認待ちのスポットはありません。</p>';
                    return;
                }
                
                const tmpl = document.getElementById('tmpl-unapproved');
                
                snap.forEach(documentSnapshot => {
                    const docId = documentSnapshot.id;
                    const data = documentSnapshot.data();
                    const clone = tmpl.content.cloneNode(true);
                    
                    clone.querySelector('.spot-name').textContent = data.name;
                    
                    const meta1 = `場所: ${data.placename || ''} ${data.floor ? `(${data.floor})` : ''} | 申請日時: ${formatDate(data.created_at)}`;
                    clone.querySelector('.spot-meta-1').textContent = meta1;
                    
                    const meta2 = `特徴: ${(data.features || []).join(', ')} | 時間: ${data.available_hours || '不明'}`;
                    clone.querySelector('.spot-meta-2').textContent = meta2;
                    
                    if (data.imageUrl) {
                        const imgLink = document.createElement('a');
                        imgLink.href = data.imageUrl;
                        imgLink.target = "_blank";
                        const img = document.createElement('img');
                        img.src = data.imageUrl;
                        img.className = "spot-img";
                        imgLink.appendChild(img);
                        clone.querySelector('.spot-img-container').appendChild(imgLink);
                    }
                    
                    clone.querySelector('.btn-approve').addEventListener('click', () => handleApproveSpot(docId));
                    clone.querySelector('.btn-delete').addEventListener('click', () => handleDeleteSpot(docId));
                    
                    listContainer.appendChild(clone);
                });
            } catch (e) {
                listContainer.innerHTML = `<p style="color:red;">読み込みエラー: ${e.message}</p>`;
            }
        }

        // ===== 2. 未解決の報告 =====
        async function renderReports() {
            const listContainer = document.getElementById('reports-list');
            listContainer.innerHTML = '';
            
            try {
                const q = query(collection(db, "reports"), where("resolved", "==", false));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    listContainer.innerHTML = '<p>現在、未解決の報告はありません。</p>';
                    return;
                }
                
                const tmpl = document.getElementById('tmpl-report');
                
                // 非同期ループを処理するため、for...of を使用
                for (const documentSnapshot of snap.docs) {
                    const docId = documentSnapshot.id;
                    const data = documentSnapshot.data();
                    const clone = tmpl.content.cloneNode(true);
                    
                    const spotName = await getSpotName(data.spotId);
                    
                    clone.querySelector('.report-category').textContent = data.category || '報告';
                    clone.querySelector('.report-spot-name').textContent = spotName;
                    clone.querySelector('.report-spot-id').textContent = `(ID: ${data.spotId})`;
                    clone.querySelector('.report-date').textContent = formatDate(data.created_at);
                    clone.querySelector('.report-text').textContent = data.text;
                    
                    clone.querySelector('.btn-resolve').addEventListener('click', () => handleResolveReport(docId));
                    clone.querySelector('.btn-delete-report').addEventListener('click', () => handleDeleteReport(docId));
                    
                    listContainer.appendChild(clone);
                }
            } catch (e) {
                listContainer.innerHTML = `<p style="color:red;">読み込みエラー: ${e.message}</p>`;
            }
        }

        // ===== 3. 最新のコメント =====
        async function renderComments() {
            const listContainer = document.getElementById('comments-list');
            listContainer.innerHTML = '';
            
            try {
                // コスト爆発を防ぐため limit(30) を適用
                const q = query(collectionGroup(db, "comments"), orderBy("created_at", "desc"), limit(30));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    listContainer.innerHTML = '<p>コメントはまだありません。</p>';
                    return;
                }
                
                const tmpl = document.getElementById('tmpl-comment');
                
                for (const documentSnapshot of snap.docs) {
                    const commentId = documentSnapshot.id;
                    const data = documentSnapshot.data();
                    const spotId = documentSnapshot.ref.parent.parent.id; // 親のspotIdを取得
                    const clone = tmpl.content.cloneNode(true);
                    
                    const spotName = await getSpotName(spotId);
                    
                    clone.querySelector('.comment-spot-name').textContent = spotName;
                    clone.querySelector('.comment-author').textContent = data.name || '名無しさん';
                    clone.querySelector('.comment-date').textContent = formatDate(data.created_at);
                    clone.querySelector('.comment-text').textContent = data.text;
                    
                    clone.querySelector('.btn-delete-comment').addEventListener('click', () => handleDeleteComment(spotId, commentId));
                    
                    listContainer.appendChild(clone);
                }
            } catch (e) {
                listContainer.innerHTML = `<p style="color:red;">読み込みエラー: ${e.message}<br>※Firestoreでインデックス(comments, created_at:降順)が作成されているか確認してください。</p>`;
            }
        }

        // ===== イベントハンドラー（ロジックの分離） =====
        
        async function handleApproveSpot(spotId) {
            if (!confirm("承認して一般公開しますか？")) return;
            try {
                await updateDoc(doc(db, "spots", spotId), { approved: true });
                alert("承認しました");
                renderAllData();
            } catch (e) {
                alert("承認に失敗しました: " + e.message);
            }
        }

        async function handleDeleteSpot(spotId) {
            if (!confirm("本当に削除しますか？\n紐づく画像やコメントも完全に削除されます。")) return;
            
            try {
                const spotRef = doc(db, "spots", spotId);
                const spotDoc = await getDoc(spotRef);
                
                // カスケード削除: 画像
                if (spotDoc.exists() && spotDoc.data().imageUrl) {
                    try {
                        const imgRef = storageRef(storage, spotDoc.data().imageUrl);
                        await deleteObject(imgRef);
                    } catch (e) {
                        console.warn("画像削除スキップ:", e);
                    }
                }

                // カスケード削除: コメント
                const commentsSnap = await getDocs(collection(db, "spots", spotId, "comments"));
                const deletePromises = commentsSnap.docs.map(d => deleteDoc(d.ref));
                await Promise.all(deletePromises);

                // 本体削除
                await deleteDoc(spotRef);
                
                alert("完全に削除しました");
                renderAllData();
            } catch (e) {
                alert("削除に失敗しました: " + e.message);
            }
        }

        async function handleResolveReport(reportId) {
            if (!confirm("この報告を「解決済み」にしますか？")) return;
            try {
                await updateDoc(doc(db, "reports", reportId), { resolved: true });
                renderReports();
            } catch (e) {
                alert("更新に失敗しました");
            }
        }

        async function handleDeleteReport(reportId) {
            if (!confirm("この報告を完全に削除しますか？")) return;
            try {
                await deleteDoc(doc(db, "reports", reportId));
                renderReports();
            } catch (e) {
                alert("削除に失敗しました");
            }
        }

        async function handleDeleteComment(spotId, commentId) {
            if (!confirm("不適切なコメントとして削除しますか？")) return;
            try {
                await deleteDoc(doc(db, "spots", spotId, "comments", commentId));
                alert("コメントを削除しました");
                renderComments();
            } catch (e) {
                alert("削除に失敗しました");
            }
        }
    </script>
</body>
</html>
