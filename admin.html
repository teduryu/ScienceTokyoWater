<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード - ScienceTokyoWater</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007AFF; --bg-base: #F2F4F7; --surface: #FFFFFF; --text-main: #1C1C1E; --text-sub: #8E8E93; --danger: #FF3B30; --success: #34C759; --border: #E5E5EA; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg-base); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h1, h2 { color: var(--primary); margin-top: 0; }
        h2 { border-bottom: 2px solid #E5F0FF; padding-bottom: 8px; font-size: 1.2rem;}
        .btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .btn-success { background: white; color: var(--success); border: 1px solid var(--success); }
        .item-row { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
        .item-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .item-meta { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 4px; }
        .item-content { font-size: 1rem; margin-bottom: 12px; white-space: pre-wrap; background: var(--bg-base); padding: 12px; border-radius: 8px;}
        .spot-img { max-width: 200px; border-radius: 8px; display: block; margin-top: 8px;}
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>管理者ダッシュボード</h1>
            <button id="logout-btn" class="btn btn-danger" style="display: none;">ログアウト</button>
        </div>

        <div id="auth-section" class="card" style="text-align: center;">
            <p>管理者権限を持つGoogleアカウントでログインしてください。</p>
            <button id="login-btn" class="btn">Googleでログイン</button>
            <p id="auth-error" style="color: var(--danger); display: none; margin-top: 10px;"></p>
        </div>

        <div id="admin-dashboard" style="display: none;">
            <div class="card">
                <h2>1. 承認待ちのスポット</h2>
                <div id="unapproved-list">読み込み中...</div>
            </div>
            <div class="card">
                <h2>2. 問題の報告 (未解決)</h2>
                <div id="reports-list">読み込み中...</div>
            </div>
            <div class="card">
                <h2>3. 最新のコメント管理</h2>
                <div id="comments-list">読み込み中...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, where, collectionGroup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8mhgrQnPLqpXJI9Fq6_PvzxKBVUViLLg", authDomain: "sciencetokyowater.firebaseapp.com",
            projectId: "sciencetokyowater", storageBucket: "sciencetokyowater.firebasestorage.app",
            messagingSenderId: "1039095456448", appId: "1:1039095456448:web:548ed9fcc01c811b470325"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_EMAILS = ['teduryu@gmail.com'];
        let spotsCache = {};

        function escapeHTML(str) { return typeof str === 'string' ? str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m])) : ''; }
        function formatDate(ts) { return ts ? new Date(ts.toMillis()).toLocaleString() : '日時不明'; }

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                loadAllAdminData();
            } else if (user) {
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('auth-error').innerText = "エラー: 管理者権限がありません";
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('admin-dashboard').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
            }
        });

        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        async function loadAllAdminData() {
            try {
                const snap = await getDocs(collection(db, "spots"));
                snap.forEach(d => { spotsCache[d.id] = d.data().name; });
            } catch(e) {}
            loadUnapprovedSpots(); loadReports(); loadComments();
        }

        async function loadUnapprovedSpots() {
            const list = document.getElementById('unapproved-list');
            try {
                const q = query(collection(db, "spots"), where("approved", "==", false));
                const snap = await getDocs(q);
                let html = '';
                snap.forEach(doc => {
                    const s = doc.data();
                    html += `
                        <div class="item-row">
                            <h3 style="margin:0 0 4px 0;">${escapeHTML(s.name)}</h3>
                            <div class="item-meta">時間: ${escapeHTML(s.available_hours)} | 申請: ${formatDate(s.created_at)}</div>
                            ${s.imageUrl ? `<a href="${s.imageUrl}" target="_blank"><img src="${s.imageUrl}" class="spot-img"></a>` : ''}
                            <div style="margin-top: 12px; display: flex; gap: 8px;">
                                <button class="btn btn-success" onclick="approveSpot('${doc.id}')">承認して公開</button>
                                <button class="btn btn-danger" onclick="deleteSpot('${doc.id}')">却下 (削除)</button>
                            </div>
                        </div>`;
                });
                list.innerHTML = html || '<p>承認待ちのスポットはありません。</p>';
            } catch (e) { list.innerHTML = `<p style="color:red;">エラー: ${e.message}</p>`; }
        }

        async function loadReports() {
            const list = document.getElementById('reports-list');
            try {
                const q = query(collection(db, "reports"), where("resolved", "==", false));
                const snap = await getDocs(q);
                let html = '';
                snap.forEach(doc => {
                    const r = doc.data();
                    html += `
                        <div class="item-row">
                            <div class="item-meta">対象: <strong>${escapeHTML(spotsCache[r.spotId] || r.spotId)}</strong> | 日時: ${formatDate(r.created_at)}</div>
                            <div class="item-content">${escapeHTML(r.text)}</div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-success" onclick="resolveReport('${doc.id}')">解決済みにする</button>
                                <button class="btn btn-danger" onclick="deleteReport('${doc.id}')">削除</button>
                            </div>
                        </div>`;
                });
                list.innerHTML = html || '<p>未解決の報告はありません。</p>';
            } catch (e) { list.innerHTML = `<p style="color:red;">エラー: ${e.message}</p>`; }
        }

        async function loadComments() {
            const list = document.getElementById('comments-list');
            try {
                const q = query(collectionGroup(db, "comments"));
                const snap = await getDocs(q);
                let cmts = [];
                snap.forEach(d => cmts.push({ id: d.id, spotId: d.ref.parent.parent.id, ...d.data() }));
                
                // nullを考慮した堅牢なソート
                cmts.sort((a, b) => {
                    const timeA = a.created_at ? a.created_at.toMillis() : Date.now();
                    const timeB = b.created_at ? b.created_at.toMillis() : Date.now();
                    return timeB - timeA;
                });
                
                let html = '';
                cmts.slice(0, 30).forEach(c => {
                    html += `
                        <div class="item-row">
                            <div class="item-meta">スポット: <strong>${escapeHTML(spotsCache[c.spotId] || c.spotId)}</strong> | 日時: ${formatDate(c.created_at)}</div>
                            <div class="item-content">${escapeHTML(c.text)}</div>
                            <button class="btn btn-danger" onclick="deleteComment('${c.spotId}', '${c.id}')">削除</button>
                        </div>`;
                });
                list.innerHTML = html || '<p>コメントはありません。</p>';
            } catch (e) { list.innerHTML = `<p style="color:red;">エラー: ${e.message}</p>`; }
        }

        window.approveSpot = async (id) => {
            if(!confirm("公開しますか？")) return;
            await updateDoc(doc(db, "spots", id), { approved: true }); loadAllAdminData();
        };
        window.deleteSpot = async (id) => {
            if(!confirm("本当に削除しますか？")) return;
            await deleteDoc(doc(db, "spots", id)); loadAllAdminData();
        };
        window.resolveReport = async (id) => {
            if(!confirm("解決済みにしますか？")) return;
            await updateDoc(doc(db, "reports", id), { resolved: true }); loadReports();
        };
        window.deleteReport = async (id) => {
            if(!confirm("報告を削除しますか？")) return;
            await deleteDoc(doc(db, "reports", id)); loadReports();
        };
        window.deleteComment = async (spotId, commentId) => {
            if(!confirm("このコメントを削除しますか？")) return;
            await deleteDoc(doc(db, "spots", spotId, "comments", commentId)); loadComments();
        };
    </script>
</body>
</html>
